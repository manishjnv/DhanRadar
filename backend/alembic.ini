# Alembic configuration file for DhanRadar.
# Run migrations via:
#   docker compose exec dhanradar-fastapi alembic upgrade head

[alembic]
# Path to migration scripts, relative to this file's location.
script_location = alembic

# Template used for new revision files.
file_template = %%(rev)s_%%(slug)s

# Timezone for revision file timestamps.
timezone = UTC

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
