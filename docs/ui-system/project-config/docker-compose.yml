version: "3.9"
services:
  postgres:
    image: postgres:16
    environment: { POSTGRES_USER: dhanradar, POSTGRES_PASSWORD: dhanradar, POSTGRES_DB: dhanradar }
    ports: ["5432:5432"]
    volumes: ["pg:/var/lib/postgresql/data", "../contracts/schema.sql:/docker-entrypoint-initdb.d/schema.sql"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    environment: { discovery.type: single-node, xpack.security.enabled: "false", ES_JAVA_OPTS: "-Xms512m -Xmx512m" }
    ports: ["9200:9200"]
  api:
    build: ../api
    env_file: [.env]
    depends_on: [postgres, redis, elasticsearch]
    ports: ["8000:8000"]
  worker:
    build: ../api
    command: celery -A app.workers.celery_app worker -B -l info
    env_file: [.env]
    depends_on: [redis, postgres]
  web:
    build: ../web
    env_file: [.env]
    depends_on: [api]
    ports: ["3000:3000"]
volumes: { pg: {} }
