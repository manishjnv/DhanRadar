<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DhanRadar — Low-Fidelity Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --paper:#F4F3EF; --ink:#2B2B2B; --ink-2:#5A5A5A; --ink-3:#8A8A8A;
  --box:#FFFFFF; --box-2:#ECEBE6; --box-3:#DFDED7; --line:#BDBCB4; --line-2:#9C9B92;
  --hatch:#D8D7CF; --accent:#3A5C8C; --note:#2F6E5B;
  --r:8px;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}

/* shell */
.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh;}
.side{position:sticky;top:0;height:100vh;overflow-y:auto;background:#EAE9E3;border-right:1px solid var(--line);padding:18px 12px;}
.side::-webkit-scrollbar{width:6px;}.side::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 14px;}
.brand-mark{width:30px;height:30px;border-radius:7px;border:2px solid var(--ink);display:grid;place-items:center;font-weight:700;background:var(--box);}
.brand-name{font-weight:700;font-size:15px;}
.brand-sub{font-family:'Caveat';font-size:14px;color:var(--note);margin-top:-2px;}
.nav-label{font-size:10px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.1em;padding:12px 10px 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;font-size:13px;color:var(--ink-2);cursor:pointer;font-weight:500;border:none;background:transparent;text-align:left;width:100%;font-family:inherit;}
.nav-item:hover{background:var(--box-2);color:var(--ink);}
.nav-item.active{background:var(--box);color:var(--ink);font-weight:600;border:1px solid var(--line);}
.nav-item .n{font-family:'Caveat';font-size:13px;color:var(--ink-3);width:18px;}
.nav-foot{margin-top:14px;padding:10px;border-top:1px dashed var(--line);font-size:11px;color:var(--ink-3);line-height:1.5;}

.main{min-width:0;}
.screen{display:none;padding:32px 40px 80px;max-width:1240px;}
.screen.active{display:block;}
.screen-head{margin-bottom:20px;}
.kicker{font-family:'Caveat';font-size:18px;color:var(--note);}
h1{font-size:28px;font-weight:700;margin:2px 0 4px;letter-spacing:-0.01em;}
.sub{font-size:14px;color:var(--ink-2);max-width:680px;line-height:1.5;}

/* journey strip */
.journey{display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:var(--box);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin:14px 0 18px;}
.journey .lbl{font-family:'Caveat';font-size:16px;color:var(--note);margin-right:6px;}
.jstep{font-size:12px;font-weight:600;background:var(--box-2);border:1px solid var(--line);border-radius:999px;padding:4px 10px;}
.jarrow{color:var(--ink-3);font-size:13px;}

/* layout: wireframe canvas + notes */
.work{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start;}
@media(max-width:1100px){.work{grid-template-columns:1fr;}.app{grid-template-columns:1fr;}.side{position:relative;height:auto;}}

/* wireframe primitives (all greyscale, lo-fi) */
.wf{background:var(--box);border:1.5px solid var(--line-2);border-radius:var(--r);overflow:hidden;}
.wf-cap{font-family:'Caveat';font-size:15px;color:var(--ink-3);text-align:center;padding:6px;border-bottom:1px dashed var(--line);background:var(--box-2);}
.region{border:1.5px dashed var(--line-2);border-radius:6px;background:repeating-linear-gradient(45deg,transparent,transparent 7px,var(--hatch) 7px,var(--hatch) 8px);}
.region.solid{background:var(--box-2);border-style:solid;}
.rlabel{font-family:'Caveat';font-size:15px;color:var(--ink-2);padding:6px 10px;}
.box{background:var(--box-2);border:1.5px solid var(--line);border-radius:6px;}
.bar{height:10px;background:var(--box-3);border-radius:3px;}
.bar.sm{height:8px;}.bar.dk{background:var(--line);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;font-size:12px;font-weight:600;padding:7px 12px;border-radius:6px;border:1.5px solid var(--ink);background:var(--box);}
.btn.fill{background:var(--ink);color:var(--box);}
.btn.gho{border-color:var(--line-2);color:var(--ink-2);}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:999px;border:1.5px solid var(--line-2);background:var(--box);color:var(--ink-2);font-weight:500;}
.chip.on{background:var(--ink);color:var(--box);border-color:var(--ink);}
.circle{border-radius:50%;border:1.5px solid var(--line-2);display:grid;place-items:center;font-family:'Caveat';font-size:13px;color:var(--ink-3);background:var(--box);}
.sq{border-radius:6px;border:1.5px solid var(--line-2);background:var(--box-2);display:grid;place-items:center;font-family:'Caveat';font-size:13px;color:var(--ink-3);}
.ph{font-family:'Caveat';font-size:14px;color:var(--ink-3);}
.gline{height:1px;background:var(--line);}
.row{display:flex;align-items:center;}.col{display:flex;flex-direction:column;}
.between{justify-content:space-between;}.center{align-items:center;}.wrap{flex-wrap:wrap;}.grow{flex:1;min-width:0;}
.g2{display:grid;grid-template-columns:1fr 1fr;}.g3{display:grid;grid-template-columns:repeat(3,1fr);}.g4{display:grid;grid-template-columns:repeat(4,1fr);}

/* annotation callout */
.anno{position:relative;}
.tag{font-family:'Caveat';font-size:14px;color:var(--accent);display:inline-flex;align-items:center;gap:4px;}
.tag::before{content:'✎';font-size:12px;}

/* app frame chrome (lo-fi) */
.appframe{display:grid;grid-template-columns:140px 1fr;min-height:480px;}
.appframe.nogrid{display:block;}
.sidebar-wf{border-right:1.5px solid var(--line);background:var(--box-2);padding:10px;}
.sidebar-wf .si{height:24px;border-radius:5px;background:var(--box-3);margin-bottom:6px;display:flex;align-items:center;padding:0 8px;font-size:11px;color:var(--ink-3);}
.sidebar-wf .si.on{background:var(--ink);color:var(--box);}
.topbar-wf{height:44px;border-bottom:1.5px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 14px;background:var(--box-2);}
.content-wf{padding:14px;}
.mob{max-width:300px;margin:0 auto;border:2px solid var(--ink);border-radius:24px;overflow:hidden;background:var(--box);}
.mob-status{height:24px;background:var(--box-2);border-bottom:1px solid var(--line);}
.mob-tab{height:48px;border-top:1.5px solid var(--line);display:flex;justify-content:space-around;align-items:center;background:var(--box-2);}
.mob-tab .t{width:34px;height:30px;border-radius:6px;border:1.5px solid var(--line-2);display:grid;place-items:center;font-size:10px;color:var(--ink-3);}
.mob-tab .t.on{background:var(--ink);color:var(--box);border-color:var(--ink);}

/* notes panel */
.notes{position:sticky;top:24px;display:flex;flex-direction:column;gap:14px;}
.ncard{background:var(--box);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;}
.ncard h4{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);font-weight:700;}
.ncard ol,.ncard ul{margin:0;padding-left:18px;}
.ncard li{font-size:12.5px;color:var(--ink-2);line-height:1.65;margin-bottom:3px;}
.ncard .hier{list-style:none;padding:0;}
.ncard .hier li{position:relative;padding-left:0;}
.ncard .hier .h1{font-weight:700;color:var(--ink);font-size:13px;}
.ncard .hier .h2{padding-left:14px;color:var(--ink-2);}
.ncard .hier .h3{padding-left:28px;color:var(--ink-3);font-size:12px;}

.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--ink-2);background:var(--box);border:1px dashed var(--line);border-radius:var(--r);padding:10px 14px;margin-bottom:18px;}
.legend span{display:inline-flex;align-items:center;gap:6px;}
.lg-box{width:22px;height:14px;border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="brand-mark">◎</div>
      <div><div class="brand-name">DhanRadar</div><div class="brand-sub">lo-fi wireframes</div></div>
    </div>
    <nav id="nav"></nav>
    <div class="nav-foot">UX only · no visual polish.<br/>Grey = placeholder. ✎ = annotation.</div>
  </aside>
  <main class="main" id="main"></main>
</div>

<script>
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
window.WF={$,$$};
</script>
<script>
/* DhanRadar — Low-fidelity wireframes. UX structure only, no visual polish. */
(function(){

/* ---- lo-fi builders ---- */
const navItems = ['Dashboard','Recommend','Stocks','Funds','ETF','Portfolio','Watchlist','AI Search','Assistant','News'];
function sidebarWF(active){
  return `<div class="sidebar-wf">
    <div class="si" style="background:none;border:none;font-weight:700;color:var(--ink);">◎ DhanRadar</div>
    ${navItems.map(n=>`<div class="si${n===active?' on':''}">${n}</div>`).join('')}
    <div style="margin-top:10px;border-top:1px dashed var(--line);padding-top:8px;">
      <div class="si">Settings</div><div class="si">Upgrade ▲</div>
    </div>
  </div>`;
}
function topbarWF(extra){
  return `<div class="topbar-wf"><div class="box" style="flex:1;max-width:320px;height:28px;display:flex;align-items:center;padding:0 10px;"><span class="ph">🔍 Search…  ⌘K</span></div>${extra||''}<div style="margin-left:auto;display:flex;gap:8px;"><div class="circle" style="width:26px;height:26px;">🔔</div><div class="circle" style="width:26px;height:26px;">AS</div></div></div>`;
}
function region(label,h){return `<div class="region" style="min-height:${h||60}px;display:flex;align-items:center;justify-content:center;"><span class="rlabel">${label}</span></div>`;}
function lines(n,w){let o='';for(let i=0;i<n;i++)o+=`<div class="bar sm" style="width:${w||[90,70,80,60][i%4]}%;margin-bottom:6px;"></div>`;return o;}
function notesPanel(layout,nav,hier){
  return `<div class="notes">
    <div class="ncard"><h4>Layout structure</h4><ul>${layout.map(x=>`<li>${x}</li>`).join('')}</ul></div>
    <div class="ncard"><h4>Navigation</h4><ul>${nav.map(x=>`<li>${x}</li>`).join('')}</ul></div>
    <div class="ncard"><h4>Content hierarchy</h4><ul class="hier">${hier.map(([lvl,t])=>`<li class="h${lvl}">${t}</li>`).join('')}</ul></div>
  </div>`;
}
function journey(steps){return `<div class="journey"><span class="lbl">User journey:</span>${steps.map((s,i)=>`${i?'<span class="jarrow">→</span>':''}<span class="jstep">${s}</span>`).join('')}</div>`;}
function head(kicker,title,sub){return `<div class="screen-head"><div class="kicker">${kicker}</div><h1>${title}</h1><div class="sub">${sub}</div></div>`;}
function screen(o){return head(o.kicker,o.title,o.sub)+journey(o.journey)+`<div class="work"><div>${o.canvas}</div>${notesPanel(o.layout,o.nav,o.hier)}</div>`;}

const LEGEND = `<div class="legend"><span><span class="lg-box region" style="height:14px;"></span> placeholder region</span><span><span class="lg-box box"></span> component block</span><span><span class="lg-box" style="background:var(--ink);"></span> primary action</span><span>✎ annotation · Caveat = label</span></div>`;

/* ============================ 01 DASHBOARD ============================ */
const dashboard = LEGEND + screen({
  kicker:'Authenticated · home', title:'Dashboard', sub:'Daily landing for signed-in users. Answers "what changed?" and "what should I look at?" in one glance — market pulse + personalized signal.',
  journey:['Login / open app','Land on Dashboard','Scan indices + watchlist movers','Tap a top-scored stock','→ Stock Detail'],
  canvas:`<div class="wf"><div class="wf-cap">Dashboard — desktop</div><div class="appframe">${sidebarWF('Dashboard')}<div><div>${topbarWF()}</div><div class="content-wf">
    <div class="row between center" style="margin-bottom:10px;"><div class="bar dk" style="width:180px;height:14px;"></div><div class="btn gho">⚙ Customize</div></div>
    <div class="g4" style="gap:8px;margin-bottom:10px;">${[1,2,3,4].map(()=>`<div class="box" style="padding:10px;"><div class="ph" style="font-size:12px;">Index KPI</div><div class="bar dk" style="width:70%;height:12px;margin-top:6px;"></div></div>`).join('')}</div>
    <div class="g2" style="gap:10px;">
      <div class="box" style="padding:0;"><div class="rlabel" style="border-bottom:1px solid var(--line);">Top-scored stocks (table) <span class="tag" style="float:right;">core CTA target</span></div>${[1,2,3,4].map(()=>`<div class="row between center" style="padding:8px 12px;border-bottom:1px dashed var(--line);"><div class="row" style="gap:8px;"><div class="sq" style="width:24px;height:24px;"></div><div class="bar" style="width:80px;"></div></div><div class="circle" style="width:26px;height:26px;">86</div></div>`).join('')}</div>
      <div class="col" style="gap:10px;">
        <div class="box" style="padding:10px;"><div class="rlabel">News feed</div>${lines(3)}</div>
        <div class="box" style="padding:10px;"><div class="rlabel">Sector heatmap</div><div class="g3" style="gap:5px;margin-top:6px;">${Array.from({length:6}).map(()=>`<div class="region" style="height:30px;"></div>`).join('')}</div></div>
      </div>
    </div>
    <div class="region" style="margin-top:10px;min-height:40px;display:flex;align-items:center;padding-left:10px;"><span class="rlabel">Portfolio snapshot + learning streak (personalized strip)</span></div>
  </div></div></div></div>`,
  layout:['Persistent left sidebar + top bar (global search ⌘K, notifications, avatar)','Row 1: market index KPIs (4-up)','Row 2: top-scored table (primary) + news/heatmap stack','Footer strip: portfolio snapshot + learning streak'],
  nav:['Sidebar = primary app nav','Top search jumps to any instrument','Each table row deep-links to Stock Detail','"Customize" reorders widgets'],
  hier:[[1,'Market pulse (indices)'],[1,'Top-scored signals'],[2,'Per-row: logo · name · price · score'],[1,'News + sector heatmap'],[2,'Portfolio snapshot'],[3,'Learning streak nudge']]
});

/* ============================ 02 RECOMMENDATIONS ============================ */
const recommendations = screen({
  kicker:'Authenticated · signals', title:'Recommendations', sub:'Curated, scored ideas with a plain-English reason. Every card carries a signal + why + target. The trust surface — never a recommendation without reasoning.',
  journey:['Dashboard / nav','Open Recommendations','Filter by signal / sector','Read "why"','Add to Watchlist or open detail'],
  canvas:`<div class="wf"><div class="wf-cap">Recommendations — desktop</div><div class="appframe">${sidebarWF('Recommend')}<div>${topbarWF()}<div class="content-wf">
    <div class="row between center" style="margin-bottom:10px;"><div class="bar dk" style="width:160px;height:14px;"></div><div class="row" style="gap:6px;"><span class="chip on">Strong Buy</span><span class="chip">Buy</span><span class="chip">Hold</span><span class="chip">All sectors ▾</span></div></div>
    <div class="g2" style="gap:10px;">${[1,2,3,4].map(()=>`<div class="box" style="padding:0;">
      <div class="row" style="gap:10px;padding:12px;"><div class="sq" style="width:40px;height:40px;"></div><div class="grow"><div class="bar" style="width:120px;"></div><div class="bar sm" style="width:70px;margin-top:5px;"></div><div class="row" style="gap:5px;margin-top:6px;"><span class="chip on">Strong Buy</span><span class="chip">Target ₹3,120</span></div></div><div class="circle" style="width:48px;height:48px;font-size:16px;">86</div></div>
      <div style="padding:0 12px 10px;"><div class="region" style="min-height:42px;display:flex;align-items:center;padding:0 10px;"><span class="rlabel">Why this signal — AI reason (2 lines)</span></div></div>
      <div class="row" style="gap:6px;padding:10px 12px;border-top:1px dashed var(--line);"><div class="btn fill">+ Watchlist</div><div class="btn gho">Why 86? →</div></div>
    </div>`).join('')}</div>
  </div></div></div></div>`,
  layout:['Filter bar: signal chips + sector dropdown (sticky)','2-up grid of recommendation cards (1-up on mobile)','Each card: header (logo/name/signal/target/score) → reason box → action footer'],
  nav:['Signal chips filter in place','"Why?" opens AI explain inline / Assistant','Card body → Stock or Fund Detail','Add-to-watchlist is the primary conversion'],
  hier:[[1,'Signal (Strong Buy/Buy/Hold/Avoid)'],[1,'Score + fair-value target'],[2,'Plain-English reason (required)'],[3,'Actions: watchlist · explain']]
});

/* ============================ 03 STOCKS ============================ */
const stocks = screen({
  kicker:'Authenticated · instrument', title:'Stocks · Detail', sub:'The flagship research surface for a single stock. Score + reasoning + price + fundamentals, with AI "explain" reachable from any metric.',
  journey:['Search / tap a stock','Read Score + factors','Tap "explain" on a metric','Check Fair Value (gated)','Set alert / add to watchlist'],
  canvas:`<div class="wf"><div class="wf-cap">Stock Detail — desktop</div><div class="appframe">${sidebarWF('Stocks')}<div>${topbarWF()}<div class="content-wf">
    <div class="ph" style="font-size:11px;">Stocks › Energy › RELIANCE  (breadcrumb)</div>
    <div class="row between center" style="margin:6px 0 10px;"><div class="row" style="gap:10px;"><div class="sq" style="width:40px;height:40px;"></div><div><div class="bar dk" style="width:160px;height:14px;"></div><div class="bar sm" style="width:100px;margin-top:5px;"></div></div></div><div class="row" style="gap:6px;"><div class="btn gho">★ Watch</div><div class="btn gho">⇄ Compare</div><div class="btn fill">Set alert</div></div></div>
    <div class="g2" style="gap:10px;grid-template-columns:1.6fr 1fr;">
      <div class="box" style="padding:12px;"><div class="row between"><div class="bar dk" style="width:120px;height:18px;"></div><div class="row" style="gap:4px;"><span class="chip">1M</span><span class="chip on">1Y</span><span class="chip">5Y</span></div></div><div class="region" style="margin-top:10px;min-height:140px;"><span class="rlabel">Price chart</span></div></div>
      <div class="box" style="padding:12px;text-align:center;"><div class="rlabel">DhanRadar Score</div><div class="circle" style="width:90px;height:90px;font-size:26px;margin:10px auto;">86</div><div class="chip on" style="margin-bottom:8px;">Strong Buy</div><div style="text-align:left;">${[1,2,3,4,5].map(()=>`<div class="row between" style="margin:5px 0;"><div class="bar sm" style="width:50px;"></div><div class="bar sm dk" style="width:90px;"></div></div>`).join('')}<div class="tag" style="margin-top:4px;">✎ each factor → tap to "explain"</div></div></div>
    </div>
    <div class="row" style="gap:14px;margin:12px 0 8px;border-bottom:1px solid var(--line);">${['Overview','Financials','Peers','SWOT','Valuation 🔒'].map((t,i)=>`<div style="padding-bottom:6px;${i===0?'border-bottom:2px solid var(--ink);font-weight:600;':'color:var(--ink-3);'}font-size:13px;">${t}</div>`).join('')}</div>
    <div class="g2" style="gap:10px;"><div class="box" style="padding:12px;"><div class="rlabel">Pros & cons</div>${lines(3)}</div><div class="region" style="min-height:90px;"><span class="rlabel">Fair value gauge 🔒 (Pro gate)</span></div></div>
  </div></div></div></div>`,
  layout:['Breadcrumb + sticky instrument header with actions','Split: price chart (wide) + score panel (narrow)','Tab bar: Overview / Financials / Peers / SWOT / Valuation','Below tabs: contextual content (pros/cons, fair value)'],
  nav:['Tabs swap content in place','Compare adds this stock to compare tray','Any factor/metric → AI explain','Locked tab/section → contextual paywall'],
  hier:[[1,'Identity + price'],[1,'DhanRadar Score'],[2,'Factor breakdown (explainable)'],[1,'Tabbed deep-dive'],[2,'Fair value (gated)']]
});

/* ============================ 04 MUTUAL FUNDS ============================ */
const funds = screen({
  kicker:'Authenticated · instrument', title:'Mutual Funds · Detail', sub:'Fund research: Score, NAV trend, rolling returns, risk-adjusted metrics, holdings, manager. Built to fight recency bias.',
  journey:['Search / Discover','Open fund','Review Score + rolling returns','Check risk + expense','Start SIP / add to watchlist'],
  canvas:`<div class="wf"><div class="wf-cap">Fund Detail — desktop</div><div class="appframe">${sidebarWF('Funds')}<div>${topbarWF()}<div class="content-wf">
    <div class="row between center" style="margin-bottom:10px;"><div class="row" style="gap:10px;"><div class="sq" style="width:40px;height:40px;"></div><div><div class="bar dk" style="width:200px;height:14px;"></div><div class="bar sm" style="width:120px;margin-top:5px;"></div></div></div><div class="btn fill">Start SIP — ₹500/mo</div></div>
    <div class="g2" style="gap:10px;grid-template-columns:1.6fr 1fr;">
      <div class="box" style="padding:12px;"><div class="row between"><div><div class="ph">NAV</div><div class="bar dk" style="width:110px;height:18px;margin-top:4px;"></div></div><div class="row" style="gap:4px;"><span class="chip">1Y</span><span class="chip on">3Y</span><span class="chip">5Y</span></div></div><div class="region" style="margin-top:10px;min-height:130px;"><span class="rlabel">NAV chart</span></div></div>
      <div class="box" style="padding:12px;text-align:center;"><div class="rlabel">Fund Score</div><div class="circle" style="width:84px;height:84px;font-size:24px;margin:10px auto;">92</div><div class="chip on">Strong Buy</div></div>
    </div>

mainEl.innerHTML = SCREENS.map((s,i)=>`<section class="screen${i===0?' active':''}" id="sc-${s.id}">${s.html}</section>`).join('');
function go(t){$$('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.t===t));$$('.screen').forEach(s=>s.classList.toggle('active',s.id==='sc-'+t));window.scrollTo({top:0});try{history.replaceState(null,'','#'+t);}catch(e){}}
$$('.nav-item').forEach(b=>b.addEventListener('click',()=>go(b.dataset.t)));
const init=(location.hash||'').slice(1);
if(SCREENS.find(s=>s.id===init)) go(init);
</script>
</body>
