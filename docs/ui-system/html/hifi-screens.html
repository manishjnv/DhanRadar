<!DOCTYPE html>
<html lang="en" class="theme-light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DhanRadar — High-Fidelity Desktop Screens</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%230B1F3A'/><stop offset='100%25' stop-color='%232563EB'/></linearGradient></defs><rect width='32' height='32' rx='7' fill='url(%23g)'/><circle cx='16' cy='16' r='8' fill='none' stroke='white' stroke-width='1.6' opacity='0.5'/><circle cx='16' cy='16' r='4.5' fill='none' stroke='white' stroke-width='1.6' opacity='0.8'/><line x1='16' y1='16' x2='23' y2='12.5' stroke='white' stroke-width='1.6' stroke-linecap='round'/><circle cx='23' cy='12.5' r='1.8' fill='%2310B981'/></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --dr-navy:#0B1F3A;--dr-blue:#2563EB;--dr-emerald:#10B981;--dr-cyan:#06B6D4;--dr-amber:#F59E0B;--dr-red:#EF4444;
  --font-display:'Manrope',ui-sans-serif,system-ui,sans-serif;--font-body:'Inter',ui-sans-serif,system-ui,sans-serif;--font-mono:'JetBrains Mono',ui-monospace,monospace;
  --r-sm:6px;--r-md:8px;--r-lg:12px;--r-xl:16px;--r-2xl:20px;
}
.theme-light{
  --bg:#FFFFFF;--bg-alt:#F8FAFC;--surface:#FFFFFF;--surface-2:#F1F5F9;--surface-3:#E2E8F0;
  --border:#E5E7EB;--border-strong:#CBD5E1;--text:#0F172A;--text-2:#334155;--text-muted:#64748B;--text-faint:#94A3B8;
  --positive:#10B981;--negative:#EF4444;--warn:#F59E0B;
  --blue-soft:rgba(37,99,235,0.10);--emerald-soft:rgba(16,185,129,0.10);--amber-soft:rgba(245,158,11,0.14);--red-soft:rgba(239,68,68,0.10);
  --shadow-sm:0 1px 3px rgba(15,23,42,0.06),0 1px 2px rgba(15,23,42,0.04);--shadow-md:0 4px 12px rgba(15,23,42,0.06),0 2px 4px rgba(15,23,42,0.04);--shadow-lg:0 16px 40px -12px rgba(15,23,42,0.12);--shadow-xl:0 28px 60px -20px rgba(15,23,42,0.18);
  --ring-bg:rgba(15,23,42,0.08);--chart-grid:rgba(15,23,42,0.06);
}
.theme-dark{
  --bg:#020617;--bg-alt:#0F172A;--surface:#0F172A;--surface-2:#1E293B;--surface-3:#293548;
  --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.16);--text:#F1F5F9;--text-2:#CBD5E1;--text-muted:#94A3B8;--text-faint:#64748B;
  --positive:#22D3A6;--negative:#F87171;--warn:#FBBF24;
  --blue-soft:rgba(37,99,235,0.18);--emerald-soft:rgba(34,211,166,0.16);--amber-soft:rgba(251,191,36,0.18);--red-soft:rgba(248,113,113,0.16);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.5);--shadow-md:0 8px 24px rgba(0,0,0,0.45);--shadow-lg:0 24px 60px -18px rgba(0,0,0,0.6);--shadow-xl:0 36px 80px -20px rgba(0,0,0,0.7);
  --ring-bg:rgba(255,255,255,0.08);--chart-grid:rgba(255,255,255,0.06);
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:var(--font-body);background:var(--bg-alt);color:var(--text);-webkit-font-smoothing:antialiased;}
.display{font-family:var(--font-display);letter-spacing:-0.02em;}
.mono{font-family:var(--font-mono);font-feature-settings:'tnum';}
.pos{color:var(--positive);}.neg{color:var(--negative);}.muted{color:var(--text-muted);}.sec{color:var(--text-2);}
:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(37,99,235,0.32);border-radius:var(--r-md);}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit;}

/* deck chrome */
.deck-top{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;height:52px;padding:0 18px;background:var(--bg);border-bottom:1px solid var(--border);}
.deck-title{font-family:var(--font-display);font-weight:700;font-size:14px;}
.deck-sel{height:34px;border:1px solid var(--border-strong);border-radius:8px;background:var(--surface);color:var(--text);font:inherit;font-size:13px;padding:0 10px;font-weight:500;}
.state-pick{display:flex;gap:2px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:3px;}
.state-pick button{font-size:12px;font-weight:600;padding:5px 11px;border-radius:5px;color:var(--text-muted);}
.state-pick button.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);}
.deck-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.tg{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-2);cursor:pointer;}
.tg .tk{width:30px;height:18px;border-radius:9px;background:var(--border-strong);position:relative;}
.tg .tk::after{content:'';position:absolute;left:2px;top:2px;width:14px;height:14px;border-radius:50%;background:var(--text);transition:transform .2s;}
.theme-dark .tg .tk::after{transform:translateX(12px);}

.stage{padding:18px;}
.screen-wrap{max-width:1320px;margin:0 auto;background:var(--bg);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-lg);}

/* app shell (inside mock) */
.app{display:grid;grid-template-columns:230px 1fr;min-height:760px;}
.sb{background:var(--bg);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:1px;}
.sb-brand{display:flex;align-items:center;gap:10px;padding:4px 8px 14px;}
.sb-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--dr-navy),var(--dr-blue));display:grid;place-items:center;flex-shrink:0;}
.sb-name{font-family:var(--font-display);font-weight:700;font-size:15px;}
.sb-lbl{font-size:10px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.1em;padding:12px 10px 5px;}
.sb-i{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text-2);font-weight:500;width:100%;text-align:left;}
.sb-i:hover{background:var(--surface-2);color:var(--text);}
.sb-i.on{background:var(--blue-soft);color:var(--dr-blue);font-weight:600;}
.sb-i .ic{width:16px;height:16px;display:grid;place-items:center;font-size:13px;opacity:.85;}
.sb-i .badge2{margin-left:auto;font-family:var(--font-mono);font-size:10px;background:var(--surface-2);color:var(--text-muted);padding:1px 6px;border-radius:5px;}
.sb-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--border);}
.up-card{background:linear-gradient(135deg,var(--blue-soft),var(--emerald-soft));border:1px solid var(--border);border-radius:10px;padding:12px;}

.tb{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--bg);}
.tb-search{position:relative;flex:1;max-width:420px;}
.tb-search input{width:100%;height:36px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);padding:0 12px 0 34px;font:inherit;font-size:13px;color:var(--text);outline:none;}
.tb-search .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);}
.tb-search .kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:10px;color:var(--text-muted);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px;}
.tb-idx{display:flex;gap:14px;align-items:center;padding-left:8px;border-left:1px solid var(--border);}
.tb-mi{display:flex;flex-direction:column;line-height:1.15;}
.tb-mi .n{font-size:9.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;}
.tb-mi .v{font-family:var(--font-mono);font-size:12px;font-weight:500;}
.tb-act{margin-left:auto;display:flex;gap:6px;align-items:center;}
.ib{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:var(--text-2);}
.ib:hover{background:var(--surface-2);color:var(--text);}
.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--dr-blue),var(--dr-emerald));color:#fff;display:grid;place-items:center;font-size:11px;font-weight:600;}

.content{padding:24px 28px 40px;overflow:auto;}
.page-h{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;gap:16px;flex-wrap:wrap;}
.crumb{font-size:12px;color:var(--text-muted);margin-bottom:4px;}
.page-h h1{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:-0.025em;margin:0;}

/* primitives */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);}
.card-h{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.card-h h3{margin:0;font-size:14px;font-weight:600;}
.card-h .sub{font-size:11px;color:var(--text-muted);}
.pad{padding:18px;}
.row{display:flex;align-items:center;}.col{display:flex;flex-direction:column;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.gap-1{gap:4px;}.gap-2{gap:8px;}.gap-3{gap:12px;}.gap-4{gap:16px;}.wrap{flex-wrap:wrap;}.between{justify-content:space-between;}.center{align-items:center;}.grow{flex:1;min-width:0;}.right{text-align:right;}
.mt-2{margin-top:8px;}.mt-3{margin-top:12px;}.mt-4{margin-top:16px;}.mb-2{margin-bottom:8px;}.mb-3{margin-bottom:12px;}
.t10{font-size:10px;}.t11{font-size:11px;}.t12{font-size:12px;}.t13{font-size:13px;}.t14{font-size:14px;}.t15{font-size:15px;}.t16{font-size:16px;}.t18{font-size:18px;}.t22{font-size:22px;}.t28{font-size:28px;}
.w-500{font-weight:500;}.w-600{font-weight:600;}.w-700{font-weight:700;}.upper{text-transform:uppercase;letter-spacing:0.07em;}
.btn{font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:all .15s;}
.btn-primary{background:var(--dr-blue);color:#fff;box-shadow:var(--shadow-sm);}.btn-primary:hover{background:#1D4ED8;}
.btn-dark{background:var(--text);color:var(--bg);}.btn-ghost{background:var(--surface-2);border:1px solid var(--border);}.btn-ghost:hover{background:var(--surface-3);}
.btn-outline{border:1px solid var(--border-strong);}.btn-success{background:var(--positive);color:#fff;}.btn-danger{background:var(--negative);color:#fff;}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:6px;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;font-family:var(--font-mono);}
.b-pos{background:var(--emerald-soft);color:var(--positive);}.b-neg{background:var(--red-soft);color:var(--negative);}.b-info{background:var(--blue-soft);color:var(--dr-blue);}.b-warn{background:var(--amber-soft);color:var(--warn);}.b-neutral{background:var(--surface-2);color:var(--text-2);}
.sb-buy{background:rgba(16,185,129,0.18);color:var(--positive);}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);font-size:12px;color:var(--text-2);font-weight:500;}
.chip.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.kpi{padding:16px 18px;}
.kpi .l{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.07em;font-weight:600;}
.kpi .v{font-family:var(--font-display);font-size:24px;font-weight:700;letter-spacing:-0.02em;margin-top:5px;line-height:1;}
.kpi .d{font-family:var(--font-mono);font-size:12px;margin-top:5px;}
.tk{display:flex;align-items:center;gap:10px;}
.tk-logo{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0;}
.dt{width:100%;border-collapse:collapse;font-size:13px;}
.dt th{text-align:left;font-weight:600;color:var(--text-muted);padding:10px 14px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);font-family:var(--font-mono);}
.dt th.r,.dt td.r{text-align:right;}
.dt td{padding:12px 14px;border-bottom:1px solid var(--border);}
.dt tr:last-child td{border-bottom:none;}
.dt tr.hov:hover td{background:var(--surface-2);}
.ring{position:relative;display:inline-grid;place-items:center;}
.ring svg{transform:rotate(-90deg);}
.ring-n{position:absolute;font-family:var(--font-mono);font-weight:600;letter-spacing:-0.025em;}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);}
.tabs .t{padding:9px 14px;font-size:13px;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;}
.tabs .t.on{color:var(--dr-blue);border-bottom-color:var(--dr-blue);font-weight:600;}
.bar{height:5px;background:var(--surface-2);border-radius:3px;overflow:hidden;}
.bar>div{height:100%;border-radius:3px;}
.toast{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--positive);box-shadow:var(--shadow-lg);font-size:13px;animation:slidein .3s ease;}
@keyframes slidein{from{transform:translateY(12px);opacity:0;}to{transform:none;opacity:1;}}

/* states */
.skel{background:linear-gradient(90deg,var(--surface-2) 0%,var(--surface-3) 50%,var(--surface-2) 100%);background-size:200% 100%;animation:sh 1.4s linear infinite;border-radius:6px;}
@keyframes sh{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.empty{padding:56px 24px;text-align:center;border:1px dashed var(--border-strong);border-radius:14px;background:var(--bg-alt);}
.empty .ei{width:56px;height:56px;border-radius:14px;background:var(--surface-2);display:grid;place-items:center;margin:0 auto 14px;font-size:24px;color:var(--text-muted);}
.errbox{padding:48px 24px;text-align:center;border:1px solid var(--red-soft);border-radius:14px;background:var(--red-soft);}
.errbox .ei{width:52px;height:52px;border-radius:14px;background:var(--negative);color:#fff;display:grid;place-items:center;margin:0 auto 14px;font-size:24px;}
.banner{display:flex;gap:12px;align-items:flex-start;padding:12px 16px;border-radius:12px;margin-bottom:16px;}
.banner.ok{background:var(--emerald-soft);}.banner.err{background:var(--red-soft);}
.banner .bi{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;color:#fff;flex-shrink:0;font-size:13px;}
.banner.ok .bi{background:var(--positive);}.banner.err .bi{background:var(--negative);}

/* admin/aiops chrome accent */
.app.admin .sb-mark{background:linear-gradient(135deg,#7f1d1d,#dc2626);}
.app.aiops .sb-mark{background:linear-gradient(135deg,#7c2d12,#ea580c);}
.app.admin .sb-i.on{background:rgba(220,38,38,0.1);color:#dc2626;}
.app.aiops .sb-i.on{background:rgba(234,88,12,0.1);color:#ea580c;}

.area{display:block;max-width:100%;}
</style>
</head>
<body>
<div class="deck-top">
  <span class="deck-title">DhanRadar · Hi-Fi</span>
  <select class="deck-sel" id="screenSel"></select>
  <div class="state-pick" id="statePick">
    <button data-s="default" class="active">Default</button>
    <button data-s="loading">Loading</button>
    <button data-s="empty">Empty</button>
    <button data-s="error">Error</button>
  </div>
  <div class="deck-right">
    <button class="btn btn-success btn-sm" id="successBtn">Trigger success ✓</button>
    <label class="tg" id="themeToggle"><span>Dark</span><span class="tk"></span></label>
  </div>
</div>
<div class="stage"><div class="screen-wrap" id="screen"></div></div>
<div id="toastHost"></div>

<script>
const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
function setTheme(t){document.documentElement.classList.toggle('theme-light',t==='light');document.documentElement.classList.toggle('theme-dark',t==='dark');try{localStorage.setItem('dr-hifi-theme',t);}catch(e){}}
setTheme((()=>{try{return localStorage.getItem('dr-hifi-theme')||'light';}catch(e){return 'light';}})());
$('#themeToggle').onclick=()=>setTheme(document.documentElement.classList.contains('theme-dark')?'light':'dark');

/* shared render helpers */
function ring(score,size,stroke){const r=(size-stroke)/2;const c=2*Math.PI*r;const off=c*(1-score/100);const col=score>=85?'var(--positive)':score>=70?'var(--dr-blue)':score>=55?'var(--warn)':score>=40?'#F97316':'var(--negative)';return `<div class="ring" style="width:${size}px;height:${size}px;"><svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--ring-bg)" stroke-width="${stroke}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg><div class="ring-n" style="font-size:${Math.round(size*0.34)}px;">${score}</div></div>`;}
function area(seed,w,h,up){let s=seed,N=60,d=[],v=100;const rnd=()=>{s=(s*9301+49297)%233280;return s/233280;};for(let i=0;i<N;i++){v*=(1+(rnd()-0.5)*0.03+(up?0.006:-0.005));d.push(v);}const lo=Math.min(...d)*0.99,hi=Math.max(...d)*1.01,rg=hi-lo,sx=w/(N-1);const pts=d.map((y,i)=>[i*sx,h-((y-lo)/rg)*(h-10)-5]);const dd='M'+pts.map(p=>`${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' L');const col=up?'var(--positive)':'var(--negative)';return `<svg class="area" width="${w}" height="${h}"><defs><linearGradient id="ar${seed}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity="0.3"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><path d="${dd} L ${w},${h} L 0,${h} Z" fill="url(#ar${seed})"/><path d="${dd}" fill="none" stroke="${col}" stroke-width="1.8"/><circle cx="${pts[N-1][0]}" cy="${pts[N-1][1]}" r="3.5" fill="${col}"/></svg>`;}
function spark(seed,w,h,up){let s=seed,N=28,d=[],v=50;const rnd=()=>{s=(s*9301+49297)%233280;return s/233280;};for(let i=0;i<N;i++){v+=(rnd()-0.5)*4+(up?0.3:-0.25);d.push(v);}const lo=Math.min(...d),hi=Math.max(...d),rg=hi-lo||1,sx=w/(N-1);const pts=d.map((y,i)=>[i*sx,h-((y-lo)/rg)*(h-2)-1]);const dd='M'+pts.map(p=>`${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' L');const col=up?'var(--positive)':'var(--negative)';return `<svg width="${w}" height="${h}" style="display:block;"><path d="${dd}" fill="none" stroke="${col}" stroke-width="1.4"/></svg>`;}
window.HF={$,$$,ring,area,spark};
</script>
<script>
/* DhanRadar — Hi-Fi desktop screens. Approved DS (Inter/Manrope/JetBrains · navy/blue/emerald). */
(function(){
const {ring,area,spark}=window.HF;

/* ---- app shell ---- */
const NAV=[
  ['dashboard','Dashboard','▦','Workspace'],['recommendations','Recommendations','◉'],['stocks','Stocks','📈'],['funds','Mutual Funds','◍'],['etf','ETF','▤'],
  ['portfolio','Portfolio','▢','Tracking'],['watchlist','Watchlist','★','','3'],
  ['aisearch','AI Search','🔍','AI'],['assistant','AI Assistant','✦'],['news','News','▥'],
];
function sidebar(active,opts){
  opts=opts||{};
  let html='';let lastG=null;
  NAV.forEach(([id,label,ic,grp,badge])=>{
    if(grp){html+=`<div class="sb-lbl">${grp}</div>`;}
    html+=`<button class="sb-i${id===active?' on':''}"><span class="ic">${ic}</span>${label}${badge?`<span class="badge2">${badge}</span>`:''}</button>`;
  });
  return `<aside class="sb">
    <div class="sb-brand"><div class="sb-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" opacity="0.4"/><circle cx="12" cy="12" r="5" opacity="0.7"/><path d="M12 12 L19 8"/><circle cx="17.5" cy="9" r="1.3" fill="#10B981" stroke="none"/></svg></div><div class="sb-name">DhanRadar</div></div>

  {id:'admin',name:'Admin Dashboard',render:admin},
  {id:'aiops',name:'AI Operations Dashboard',render:aiops},
];
})();

</script>
<script>
const SCREENS=window.HIFI_SCREENS;
$('#screenSel').innerHTML=SCREENS.map((s,i)=>`<option value="${s.id}">${String(i+1).padStart(2,'0')} · ${s.name}</option>`).join('');
let cur=SCREENS[0].id, curState='default';
function render(){const s=SCREENS.find(x=>x.id===cur);$('#screen').innerHTML=s.render(curState);}
$('#screenSel').onchange=e=>{cur=e.target.value;curState='default';$$('#statePick button').forEach(b=>b.classList.toggle('active',b.dataset.s==='default'));render();};
$$('#statePick button').forEach(b=>b.onclick=()=>{curState=b.dataset.s;$$('#statePick button').forEach(x=>x.classList.toggle('active',x===b));render();});
$('#successBtn').onclick=()=>{const h=$('#toastHost');h.innerHTML=`<div class="toast"><span style="color:var(--positive);font-size:15px;">✓</span> <span><b>Success.</b> Added to watchlist · alert created.</span></div>`;setTimeout(()=>h.innerHTML='',2600);};
const h=(location.hash||'').slice(1);if(SCREENS.find(s=>s.id===h)){cur=h;$('#screenSel').value=h;}
render();
</script>
</body>
</html>
