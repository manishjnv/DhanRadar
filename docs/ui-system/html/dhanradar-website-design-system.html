<style>
/* ─── Tokens (mirrors css-variables.css) ───────────────────────── */
:root {
  --dr-navy:#0B1F3A; --dr-blue:#2563EB; --dr-emerald:#10B981;
  --dr-cyan:#06B6D4; --dr-amber:#F59E0B; --dr-red:#EF4444;
  --dr-font-display: 'Manrope', ui-sans-serif, system-ui, -apple-system, sans-serif;
  --dr-font-body:    'Inter',   ui-sans-serif, system-ui, -apple-system, sans-serif;
  --dr-font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
  --dr-r-sm:6px; --dr-r-md:8px; --dr-r-lg:12px; --dr-r-xl:16px; --dr-r-2xl:20px;
}
.theme-light {
  --bg:#FFFFFF; --bg-alt:#F8FAFC;
  --surface:#FFFFFF; --surface-2:#F1F5F9; --surface-3:#E2E8F0;
  --border:#E5E7EB; --border-strong:#CBD5E1;
  --text:#0F172A; --text-secondary:#334155; --text-muted:#64748B; --text-faint:#94A3B8;
  --positive:#10B981; --negative:#EF4444; --warn:#F59E0B;
  --blue-soft:rgba(37,99,235,0.10); --emerald-soft:rgba(16,185,129,0.10);
  --amber-soft:rgba(245,158,11,0.14); --red-soft:rgba(239,68,68,0.10);
  --shadow-xs: 0 1px 2px rgba(15,23,42,0.04);
  --shadow-sm: 0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
  --shadow-md: 0 4px 12px rgba(15,23,42,0.06), 0 2px 4px rgba(15,23,42,0.04);
  --shadow-lg: 0 16px 40px -12px rgba(15,23,42,0.12);
  --shadow-xl: 0 28px 60px -20px rgba(15,23,42,0.18);
  --score-ring-bg: rgba(15,23,42,0.08);
  --chart-grid: rgba(15,23,42,0.06);
}
.theme-dark {
  --bg:#020617; --bg-alt:#0F172A;
  --surface:#0F172A; --surface-2:#1E293B; --surface-3:#293548;
  --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16);
  --text:#F1F5F9; --text-secondary:#CBD5E1; --text-muted:#94A3B8; --text-faint:#64748B;
  --positive:#22D3A6; --negative:#F87171; --warn:#FBBF24;
  --blue-soft:rgba(37,99,235,0.18); --emerald-soft:rgba(34,211,166,0.16);
  --amber-soft:rgba(251,191,36,0.18); --red-soft:rgba(248,113,113,0.16);
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.5);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.5);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.45);
  --shadow-lg: 0 24px 60px -18px rgba(0,0,0,0.6);
  --shadow-xl: 0 36px 80px -20px rgba(0,0,0,0.7);
  --score-ring-bg: rgba(255,255,255,0.08);
  --chart-grid: rgba(255,255,255,0.06);
}

/* ─── Reset + base ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--dr-font-body);
  background: var(--bg); color: var(--text);
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  transition: background .18s ease, color .18s ease;
}
.display { font-family: var(--dr-font-display); }
.mono { font-family: var(--dr-font-mono); font-feature-settings: 'tnum','zero'; }
.pos { color: var(--positive); } .neg { color: var(--negative); }
.muted { color: var(--text-muted); } .faint { color: var(--text-faint); } .sec { color: var(--text-secondary); }
a { color: var(--dr-blue); text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; }

:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.32); border-radius: var(--dr-r-md); }

/* ─── App shell ────────────────────────────────────────────────── */
.app { display: grid; grid-template-columns: 272px 1fr; min-height: 100vh; }

.side {
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  background: var(--bg); border-right: 1px solid var(--border);
  padding: 22px 14px; display: flex; flex-direction: column; gap: 2px;
}
.side::-webkit-scrollbar { width: 6px; } .side::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

.brand-row { display: flex; align-items: center; gap: 12px; padding: 4px 10px 18px; }
.brand-mark {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--dr-navy), var(--dr-blue));
  display: grid; place-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}
.brand-name { font-family: var(--dr-font-display); font-weight: 700; font-size: 17px; letter-spacing: -0.015em; }
.brand-ver { font-family: var(--dr-font-mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

.side-search { position: relative; margin: 4px 4px 14px; }
.side-search input {
  width: 100%; height: 36px; border-radius: 8px;
  background: var(--surface-2); border: 1px solid var(--border);
  padding: 0 32px 0 34px; font: inherit; font-size: 13px; color: var(--text); outline: none;
}
.side-search input::placeholder { color: var(--text-faint); }
.side-search .si { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
.side-search .sk {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-family: var(--dr-font-mono); font-size: 10px; color: var(--text-muted);
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px;
}

.nav-label {
  font-size: 10px; font-weight: 600; color: var(--text-faint);
  text-transform: uppercase; letter-spacing: 0.1em; padding: 14px 12px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 8px;
  font-size: 13.5px; color: var(--text-secondary); cursor: pointer;
  font-weight: 500; transition: background .12s ease, color .12s ease;
  border: none; background: transparent; text-align: left; width: 100%;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active { background: var(--surface-2); color: var(--text); font-weight: 600; }
.nav-item .ni { width: 18px; height: 18px; flex: 0 0 auto; color: var(--text-muted); }
.nav-item.active .ni { color: var(--dr-blue); }
.nav-item .pill {
  margin-left: auto; font-family: var(--dr-font-mono);
  font-size: 10px; color: var(--text-muted);
}

.side-foot { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.theme-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-radius: 8px; background: var(--surface-2);
  border: 1px solid var(--border); cursor: pointer; font-size: 13px;
  color: var(--text-secondary);
}
.theme-toggle:hover { background: var(--surface-3); }
.theme-toggle .tt-track { width: 30px; height: 18px; border-radius: 10px; background: var(--border-strong); position: relative; }
.theme-toggle .tt-knob {
  position: absolute; left: 2px; top: 2px; width: 14px; height: 14px;
  border-radius: 50%; background: var(--text); transition: transform .2s ease;
}
.theme-dark .theme-toggle .tt-knob { transform: translateX(12px); }

/* ─── Main content ─────────────────────────────────────────────── */
.main { padding: 0; min-width: 0; }
.section { display: none; padding: 64px 72px 96px; max-width: 1280px; }
.section.active { display: block; }
.section-head { margin-bottom: 36px; max-width: 760px; }
.eyebrow {
  font-family: var(--dr-font-mono); font-size: 11px; color: var(--dr-blue);
  text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600; margin-bottom: 14px;
}
h1.title { font-family: var(--dr-font-display); font-size: 56px; font-weight: 700; letter-spacing: -0.035em; margin: 0 0 18px; line-height: 1.02; }
.lede { font-size: 17px; line-height: 1.6; color: var(--text-secondary); max-width: 660px; }

h2.h2 { font-family: var(--dr-font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 56px 0 6px; line-height: 1.2; }
.h2-sub { color: var(--text-muted); font-size: 15px; line-height: 1.55; margin-bottom: 22px; max-width: 640px; }
h3.h3 {
  font-size: 11px; font-family: var(--dr-font-mono); font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
  margin: 28px 0 12px;
}

/* ─── Surfaces ─────────────────────────────────────────────────── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--dr-r-xl); overflow: hidden; }
.card-pad { padding: 22px 24px; }

.row { display: flex; align-items: center; }
.col { display: flex; flex-direction: column; }
.gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-6 { gap: 24px; }
.grow { flex: 1 1 0; min-width: 0; }
.between { justify-content: space-between; } .center { align-items: center; } .wrap { flex-wrap: wrap; }
.mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; } .mt-4 { margin-top: 16px; } .mt-6 { margin-top: 24px; } .mt-8 { margin-top: 32px; }
.mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 12px; } .mb-4 { margin-bottom: 16px; }
.right { text-align: right; }

.t10 { font-size: 10px; } .t11 { font-size: 11px; } .t12 { font-size: 12px; } .t13 { font-size: 13px; }
.t14 { font-size: 14px; } .t15 { font-size: 15px; } .t16 { font-size: 16px; } .t18 { font-size: 18px; }
.t20 { font-size: 20px; } .t24 { font-size: 24px; } .t32 { font-size: 32px; }
.w-500 { font-weight: 500; } .w-600 { font-weight: 600; } .w-700 { font-weight: 700; }
.upper { text-transform: uppercase; letter-spacing: 0.08em; }

/* ─── Buttons ──────────────────────────────────────────────────── */
.btn {
  font-family: inherit; font-size: 14px; font-weight: 600;
  padding: 9px 16px; border-radius: 8px; border: 1px solid transparent;
  background: transparent; color: var(--text); cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all .15s ease; white-space: nowrap; letter-spacing: -0.005em;
}
.btn-primary { background: var(--dr-blue); color: white; box-shadow: var(--shadow-sm); }
.btn-primary:hover { background: #1D4ED8; box-shadow: var(--shadow-md); }
.btn-dark { background: var(--text); color: var(--bg); }
.btn-dark:hover { opacity: 0.9; }
.btn-ghost { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface-3); }
.btn-outline { border: 1px solid var(--border-strong); }
.btn-outline:hover { background: var(--surface-2); }
.btn-success { background: var(--positive); color: white; }
.btn-danger { background: var(--negative); color: white; }
.btn-sm { padding: 6px 12px; font-size: 12.5px; border-radius: 6px; }
.btn-lg { padding: 12px 22px; font-size: 15px; border-radius: 10px; }

/* ─── Badges ────────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
  font-family: var(--dr-font-mono);
}
.badge-pos { background: var(--emerald-soft); color: var(--positive); }
.badge-neg { background: var(--red-soft); color: var(--negative); }
.badge-info { background: var(--blue-soft); color: var(--dr-blue); }
.badge-warn { background: var(--amber-soft); color: var(--warn); }
.badge-neutral { background: var(--surface-2); color: var(--text-secondary); }
.signal-strong-buy { background: rgba(16,185,129,0.16); color: var(--positive); }

.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 11px; border-radius: 999px; background: var(--surface-2);
  border: 1px solid var(--border); font-size: 12px; color: var(--text-secondary);
  cursor: pointer; font-weight: 500;
}
.chip:hover { background: var(--surface-3); color: var(--text); }
.chip.active { background: var(--text); color: var(--bg); border-color: var(--text); }

/* ─── Swatches ─────────────────────────────────────────────── */
.swatch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.swatch {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  overflow: hidden; cursor: pointer; transition: transform .15s ease, box-shadow .15s ease;
  text-align: left; font-family: inherit; color: inherit;
}
.swatch:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.swatch-color { height: 100px; position: relative; }
.swatch-meta { padding: 14px 16px; }
.swatch-name { font-size: 13.5px; font-weight: 600; letter-spacing: -0.005em; }
.swatch-hex { font-family: var(--dr-font-mono); font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }
.swatch-hex.copied { color: var(--positive); }
.swatch-role { font-family: var(--dr-font-mono); font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 6px; }

/* Type specimens */
.type-row {
  display: grid; grid-template-columns: 100px 1fr 220px;
  padding: 22px 0; border-bottom: 1px solid var(--border); align-items: baseline; gap: 24px;
}
.type-row:last-child { border-bottom: none; }
.type-label { font-family: var(--dr-font-mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
.type-spec { font-family: var(--dr-font-mono); font-size: 11px; color: var(--text-muted); text-align: right; }

/* Token tables */
.token-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.token-table th, .token-table td { padding: 11px 16px; border-bottom: 1px solid var(--border); text-align: left; }
.token-table tr:last-child td { border-bottom: none; }
.token-table th {
  font-family: var(--dr-font-mono); font-size: 10.5px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
}
.token-table td.mono { font-family: var(--dr-font-mono); font-size: 12.5px; }
.copy-btn {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px;
  font-family: var(--dr-font-mono); font-size: 10.5px; padding: 3px 8px;
  color: var(--text-secondary); cursor: pointer; font-weight: 500;
}
.copy-btn:hover { background: var(--surface-3); color: var(--text); }
.copy-btn.copied { color: var(--positive); }

/* Component stages */
.comp-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 22px 24px 24px; margin-bottom: 16px;
}
.comp-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
.comp-head h4 { margin: 0; font-size: 15px; font-weight: 600; }
.comp-head .ch-sub { font-family: var(--dr-font-mono); font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.comp-stage {
  padding: 24px; border-radius: 12px; background: var(--bg-alt);
  border: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
  margin-bottom: 10px;
}
.code {
  font-family: var(--dr-font-mono); font-size: 11.5px; line-height: 1.6;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; color: var(--text-secondary); overflow-x: auto; white-space: pre;
}
.code .k { color: var(--dr-blue); } .code .s { color: var(--positive); }
.code .c { color: var(--text-faint); } .code .v { color: var(--warn); }

/* Inputs */
.input {
  width: 100%; height: 40px; padding: 0 12px;
  background: var(--surface); border: 1px solid var(--border-strong); border-radius: 8px;
  font: inherit; font-size: 14px; color: var(--text); outline: none;
  transition: border .15s ease, box-shadow .15s ease;
}
.input:focus { border-color: var(--dr-blue); box-shadow: 0 0 0 3px var(--blue-soft); }
.input::placeholder { color: var(--text-faint); }

input[type="range"].slider {
  -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px;
  background: var(--surface-3); outline: none; width: 100%;
}
input[type="range"].slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--dr-blue); cursor: pointer; border: 2px solid var(--bg);
}

/* Tables */
.dt { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.dt th {
  text-align: left; font-weight: 600; color: var(--text-muted);
  padding: 11px 16px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border); font-family: var(--dr-font-mono);
}
.dt th.right, .dt td.right { text-align: right; }
.dt td { padding: 13px 16px; border-bottom: 1px solid var(--border); }
.dt tr:last-child td { border-bottom: none; }
.dt tr.hov:hover td { background: var(--surface-2); }

.tk-logo { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; color: white; font-size: 12px; font-weight: 700; flex: 0 0 auto; }

/* Score ring */
.ring-wrap { position: relative; display: inline-grid; place-items: center; }
.ring-wrap svg { transform: rotate(-90deg); display: block; }
.ring-wrap .ring-n {
  position: absolute; font-family: var(--dr-font-mono); font-weight: 600; letter-spacing: -0.03em;
}

/* KPI */
.kpi { padding: 18px 20px; }
.kpi .label { font-family: var(--dr-font-mono); font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 6px; }
.kpi .val { font-family: var(--dr-font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.025em; line-height: 1; }
.kpi .delta { font-family: var(--dr-font-mono); font-size: 12.5px; margin-top: 6px; font-weight: 500; }

/* Tabs */
.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); }
.tabs .tab {
  padding: 10px 16px; font-size: 13.5px; color: var(--text-muted); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500;
  background: transparent; border-top: none; border-left: none; border-right: none;
}
.tabs .tab:hover { color: var(--text); }
.tabs .tab.active { color: var(--dr-blue); border-bottom-color: var(--dr-blue); font-weight: 600; }

/* Pricing */
.plan {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 28px; display: flex; flex-direction: column; gap: 16px;
}
.plan.featured { border-color: var(--dr-blue); position: relative; box-shadow: 0 0 0 1px var(--dr-blue) inset; }
.plan-name { font-family: var(--dr-font-mono); font-size: 12px; color: var(--dr-blue); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
.plan-price { font-family: var(--dr-font-display); font-size: 40px; font-weight: 700; letter-spacing: -0.025em; }
.plan-price .per { font-size: 14px; color: var(--text-muted); font-family: var(--dr-font-body); font-weight: 500; }
.plan ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.plan ul li { font-size: 13.5px; color: var(--text-secondary); display: flex; gap: 9px; }
.plan ul li::before { content: '✓'; color: var(--positive); font-weight: 700; }

/* Toast */
.toast {
  display: inline-flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: 10px;
  background: var(--surface); border: 1px solid var(--border);
  box-shadow: var(--shadow-md); font-size: 13.5px;
}

/* Accordion */
.acc-item { border-top: 1px solid var(--border); }
.acc-item:last-child { border-bottom: 1px solid var(--border); }
.acc-q { padding: 18px 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 500; }
.acc-a { padding: 0 4px 18px; color: var(--text-muted); font-size: 14px; line-height: 1.6; max-width: 720px; display: none; }
.acc-item.open .acc-a { display: block; }
.acc-item.open .acc-chev { transform: rotate(90deg); }
.acc-chev { transition: transform .18s ease; color: var(--text-muted); }

/* Skeleton */
.skel {
  background: linear-gradient(90deg, var(--surface-2) 0%, var(--surface-3) 50%, var(--surface-2) 100%);
  background-size: 200% 100%; animation: shimmer 1.5s linear infinite;
  border-radius: 6px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Empty state */
.empty {
  padding: 56px 24px; text-align: center; border: 1px dashed var(--border-strong);
  border-radius: 12px; background: var(--bg-alt);
}
.empty .e-icon {
  width: 56px; height: 56px; border-radius: 14px; background: var(--surface-2);
  display: grid; place-items: center; margin: 0 auto 14px; color: var(--text-muted); font-size: 22px;
}

/* Search states */
.section.hidden-by-search { display: none !important; }
.nav-item.hidden-by-search { display: none; }

/* ─── Page mockup ─────────────────────────────────────────────── */
.pages-stage { display: grid; grid-template-columns: 232px 1fr; gap: 24px; align-items: flex-start; }
.page-list { display: flex; flex-direction: column; gap: 3px; max-height: 75vh; overflow-y: auto; }
.page-list-item {
  text-align: left; background: transparent; border: 1px solid transparent;
  border-radius: 8px; padding: 10px 12px; font: inherit;
  font-size: 13.5px; color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; gap: 10px;
}
.page-list-item:hover { background: var(--surface-2); color: var(--text); }
.page-list-item.active { background: var(--surface-2); color: var(--text); font-weight: 600; }
.page-list-item .sn { font-family: var(--dr-font-mono); font-size: 10.5px; color: var(--text-muted); width: 18px; }

.page-pane {
  display: flex; flex-direction: column; gap: 12px;
}
.page-toolbar { display: flex; align-items: center; gap: 8px; }
.viewport-pick {
  display: flex; gap: 0; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 3px;
}
.viewport-pick button {
  background: transparent; border: none; padding: 5px 10px; font: inherit; font-size: 11.5px;
  color: var(--text-muted); cursor: pointer; border-radius: 5px; font-weight: 500;
  display: inline-flex; align-items: center; gap: 5px;
}
.viewport-pick button.active { background: var(--bg); color: var(--text); box-shadow: var(--shadow-xs); }

.page-frame {
  background: var(--bg-alt); border: 1px solid var(--border); border-radius: 16px;
  padding: 24px; display: flex; justify-content: center; align-items: flex-start;
  overflow: hidden; min-height: 720px;
}
.page-frame .page-canvas {
  background: white; border-radius: 8px; box-shadow: var(--shadow-md);
  overflow: hidden; transition: width .25s ease;
}
.theme-dark .page-frame .page-canvas { background: #0F172A; }

.page-canvas iframe { width: 100%; height: 100%; border: 0; display: block; }

/* Page meta panel */
.page-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.page-meta .card-pad { padding: 16px 18px; }

/* Section footer */
.section-foot {
  margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between;
}

/* ─── Responsive ─────────────────────────────────────────────── */
@media (max-width: 980px) {
  .app { grid-template-columns: 1fr; }
  .side { position: relative; height: auto; }
  .section { padding: 32px 24px 64px; }
  .swatch-grid { grid-template-columns: repeat(2, 1fr); }
  .pages-stage { grid-template-columns: 1fr; }
}

/* Print */
@media print {
  .side { display: none; }
  .app { grid-template-columns: 1fr; }
  .section { display: block !important; page-break-before: always; }
  .section:first-of-type { page-break-before: avoid; }
}
</style>

<script>
/* ─── Helpers + state ─────────────────────────────────────────── */
const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
window.$ = $; window.$$ = $$;

function setTheme(t) {
  document.documentElement.classList.toggle('theme-light', t === 'light');
  document.documentElement.classList.toggle('theme-dark', t === 'dark');
  try { localStorage.setItem('dr-ws-theme', t); } catch(e){}
}
const _t = (() => { try { return localStorage.getItem('dr-ws-theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); } catch(e){ return 'light'; } })();
setTheme(_t);
$('#themeToggle').addEventListener('click', () => {
  setTheme(document.documentElement.classList.contains('theme-dark') ? 'light' : 'dark');
});

function navigate(target) {
  $$('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.target === target));
  $$('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + target));
  window.scrollTo({ top: 0, behavior: 'instant' });
  try { history.replaceState(null, '', '#' + target); } catch(e){}
}
window.navigate = navigate;
window.DR = { navigate };

window.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); $('#search').focus(); }
});

function copyText(t, el) {
  try {
    navigator.clipboard.writeText(t);
    if (el) {
      const o = el.textContent; el.textContent = '✓ Copied'; el.classList.add('copied');
      setTimeout(() => { el.textContent = o; el.classList.remove('copied'); }, 900);
    }
  } catch(e) {}
}
window.copyText = copyText;

/* ─── Search ──────────────────────────────────────────────────── */
function bindSearch() {
  $('#search').addEventListener('input', e => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) {
      $$('.nav-item').forEach(b => b.classList.remove('hidden-by-search'));
      $$('.section').forEach(s => s.classList.remove('hidden-by-search'));
      return;
    }
    $$('.nav-item').forEach(b => {
      const text = (b.textContent + ' ' + b.dataset.target).toLowerCase();
      b.classList.toggle('hidden-by-search', !text.includes(q));
    });
    $$('.section').forEach(s => {
      s.classList.toggle('hidden-by-search', !s.textContent.toLowerCase().includes(q));
    });
  });
}

/* ─── Re-usable rendering bits ────────────────────────────────── */
function ringSvg(score, size = 56, stroke = 5) {
  const r = (size - stroke) / 2; const c = 2 * Math.PI * r; const off = c * (1 - score/100);
  const col = score >= 85 ? 'var(--positive)' : score >= 70 ? 'var(--dr-blue)' : score >= 55 ? 'var(--warn)' : score >= 40 ? '#F97316' : 'var(--negative)';
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px;flex:0 0 auto;">
    <svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--score-ring-bg)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/></svg>
    <div class="ring-n" style="font-size:${Math.round(size * 0.34)}px;">${score}</div>
  </div>`;
}

function spark(seed, w = 80, h = 24, up = true) {
  let s = seed; const N = 32; const data = []; let v = 50;
  const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  for (let i = 0; i < N; i++) { v += (rand() - 0.5) * 4 + (up ? 0.35 : -0.3); data.push(v); }
  const lo = Math.min(...data), hi = Math.max(...data);
  const range = hi - lo || 1; const stepX = w / (N - 1);
  const pts = data.map((v, i) => [i * stepX, h - ((v - lo) / range) * (h - 2) - 1]);
  const d = 'M' + pts.map(([x,y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' L');
  const col = up ? 'var(--positive)' : 'var(--negative)';
  return `<svg width="${w}" height="${h}" style="display:block;"><path d="${d} L ${w},${h} L 0,${h} Z" fill="${col}" opacity="0.14"/><path d="${d}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}
function areaChart(seed, w, h, up = true) {
  let s = seed; const N = 80; const data = []; let v = 100;
  const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  for (let i = 0; i < N; i++) { v *= (1 + (rand() - 0.5) * 0.03 + (up ? 0.006 : -0.005)); data.push(v); }
  const lo = Math.min(...data) * 0.99, hi = Math.max(...data) * 1.01;
  const range = hi - lo; const stepX = w / (N - 1);
  const pts = data.map((v, i) => [i * stepX, h - ((v - lo) / range) * (h - 10) - 5]);
  const d = 'M' + pts.map(([x,y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' L');
  const col = up ? 'var(--positive)' : 'var(--negative)';
  const gid = 'g' + seed;
  return `<svg width="${w}" height="${h}" style="display:block;">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${d} L ${w},${h} L 0,${h} Z" fill="url(#${gid})"/>
    <path d="${d}" fill="none" stroke="${col}" stroke-width="1.8"/>
    <circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="4" fill="${col}"/>
  </svg>`;
}

window.ringSvg = ringSvg; window.spark = spark; window.areaChart = areaChart;
</script>

function pRing(score, size = 64, stroke = 6) {
  const r = (size - stroke) / 2; const c = 2 * Math.PI * r; const off = c * (1 - score/100);
  const col = score >= 85 ? '#10B981' : score >= 70 ? '#2563EB' : score >= 55 ? '#F59E0B' : score >= 40 ? '#F97316' : '#EF4444';
  return `<div class="ring" style="width:${size}px;height:${size}px;"><svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#E2E8F0" stroke-width="${stroke}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/></svg><div class="ring-n" style="font-size:${Math.round(size * 0.34)}px;">${score}</div></div>`;
}

function pArea(seed, w, h, up = true) {
  let s = seed; const N = 80; const data = []; let v = 100;
  const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  for (let i = 0; i < N; i++) { v *= (1 + (rand() - 0.5) * 0.03 + (up ? 0.006 : -0.005)); data.push(v); }
  const lo = Math.min(...data) * 0.99, hi = Math.max(...data) * 1.01;
  const range = hi - lo; const stepX = w / (N - 1);
  const pts = data.map((v, i) => [i * stepX, h - ((v - lo) / range) * (h - 10) - 5]);
  const d = 'M' + pts.map(([x,y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(' L');
  const col = up ? '#10B981' : '#EF4444';
  return `<svg width="${w}" height="${h}" style="display:block;"><defs><linearGradient id="g${seed}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity="0.32"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs><path d="${d} L ${w},${h} L 0,${h} Z" fill="url(#g${seed})"/><path d="${d}" fill="none" stroke="${col}" stroke-width="1.8"/></svg>`;
}

function renderPage(id) {

  $('#pageFrame').srcdoc = p.render();
  $('#pageMeta').textContent = `${p.cat} · ${p.name}`;
  $('#pageSections').innerHTML = p.sections.map(s => `<div>· ${s}</div>`).join('');
  $('#pageNotes').textContent = p.notes;
  $$('.page-list-item').forEach((b, i) => b.classList.toggle('active', PAGES[i].id === id));
}

// Viewport picker
$$('#vpPick button').forEach(b => b.onclick = () => {
  $$('#vpPick button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  const w = parseInt(b.dataset.w, 10);
  $('#pageCanvas').style.width = w + 'px';
});

renderPage('home');
window.renderPage = renderPage;
</script>

</body>
</html>
