<style>
:root{--dr-navy:#0B1F3A;--dr-blue:#2563EB;--dr-emerald:#10B981;--dr-cyan:#06B6D4;--dr-amber:#F59E0B;--dr-red:#EF4444;
  --font-display:'Manrope',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --r-md:8px;--r-lg:12px;--r-xl:16px;}
.theme-light{--bg:#FFFFFF;--bg-alt:#F8FAFC;--surface:#FFFFFF;--surface-2:#F1F5F9;--surface-3:#E2E8F0;--border:#E5E7EB;--border-strong:#CBD5E1;
  --text:#0F172A;--text-2:#334155;--text-muted:#64748B;--text-faint:#94A3B8;--positive:#10B981;--negative:#EF4444;--warn:#F59E0B;
  --blue-soft:rgba(37,99,235,0.10);--emerald-soft:rgba(16,185,129,0.10);--amber-soft:rgba(245,158,11,0.14);--red-soft:rgba(239,68,68,0.10);--cyan-soft:rgba(6,182,212,0.12);
  --shadow-sm:0 1px 3px rgba(15,23,42,0.06),0 1px 2px rgba(15,23,42,0.04);--shadow-md:0 4px 12px rgba(15,23,42,0.06),0 2px 4px rgba(15,23,42,0.04);--shadow-lg:0 16px 40px -12px rgba(15,23,42,0.12);
  --ring-bg:rgba(15,23,42,0.08);}
.theme-dark{--bg:#020617;--bg-alt:#0F172A;--surface:#0F172A;--surface-2:#1E293B;--surface-3:#293548;--border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.16);
  --text:#F1F5F9;--text-2:#CBD5E1;--text-muted:#94A3B8;--text-faint:#64748B;--positive:#22D3A6;--negative:#F87171;--warn:#FBBF24;
  --blue-soft:rgba(37,99,235,0.18);--emerald-soft:rgba(34,211,166,0.16);--amber-soft:rgba(251,191,36,0.18);--red-soft:rgba(248,113,113,0.16);--cyan-soft:rgba(6,182,212,0.2);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.5);--shadow-md:0 8px 24px rgba(0,0,0,0.45);--shadow-lg:0 24px 60px -18px rgba(0,0,0,0.6);
  --ring-bg:rgba(255,255,255,0.08);}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--bg-alt);color:var(--text);-webkit-font-smoothing:antialiased;}
.disp{font-family:var(--font-display);letter-spacing:-0.02em;}.mono{font-family:var(--font-mono);font-feature-settings:'tnum';}
.pos{color:var(--positive);}.neg{color:var(--negative);}.muted{color:var(--text-muted);}.sec{color:var(--text-2);}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit;}
:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(37,99,235,0.32);border-radius:var(--r-md);}

.app{display:grid;grid-template-columns:256px 1fr;min-height:100vh;}
.side{position:sticky;top:0;height:100vh;overflow-y:auto;background:var(--bg);border-right:1px solid var(--border);padding:18px 12px;}
.side::-webkit-scrollbar{width:6px;}.side::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px;}
.brand{display:flex;align-items:center;gap:11px;padding:4px 8px 14px;}
.bm{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--dr-navy),var(--dr-blue));display:grid;place-items:center;flex-shrink:0;}
.bn{font-family:var(--font-display);font-weight:700;font-size:15px;}
.bs{font-family:var(--font-mono);font-size:9.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;}
.nl{font-size:10px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.1em;padding:14px 10px 5px;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text-2);font-weight:500;width:100%;text-align:left;}
.ni:hover{background:var(--surface-2);color:var(--text);}
.ni.on{background:var(--blue-soft);color:var(--dr-blue);font-weight:600;}
.ni .ic{width:18px;text-align:center;font-size:13px;}
.foot{margin-top:14px;padding:12px 10px;border-top:1px solid var(--border);font-size:11px;color:var(--text-faint);line-height:1.5;}
.tgl{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-2);cursor:pointer;margin-top:10px;}
.tgl .tk{width:30px;height:18px;border-radius:9px;background:var(--border-strong);position:relative;}
.tgl .tk::after{content:'';position:absolute;left:2px;top:2px;width:14px;height:14px;border-radius:50%;background:var(--text);transition:.2s;}
.theme-dark .tgl .tk::after{transform:translateX(12px);}

.main{min-width:0;}
.sec-screen{display:none;padding:40px 48px 80px;max-width:1080px;}
.sec-screen.on{display:block;}
.eyebrow{font-family:var(--font-mono);font-size:11px;color:var(--dr-blue);text-transform:uppercase;letter-spacing:0.14em;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
h1.ttl{font-family:var(--font-display);font-size:36px;font-weight:700;letter-spacing:-0.03em;margin:0 0 12px;line-height:1.05;}
.lede{font-size:16px;line-height:1.6;color:var(--text-2);max-width:680px;margin:0 0 6px;}
h2.h2{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-0.015em;margin:40px 0 6px;}
.h2s{color:var(--text-muted);font-size:13.5px;margin-bottom:18px;}
.usage{background:var(--cyan-soft);border-radius:12px;padding:12px 16px;font-size:12.5px;color:var(--text-2);line-height:1.55;margin:14px 0 22px;display:flex;gap:10px;}
.usage b{color:var(--text);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);}
.card-h{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.card-h h3{margin:0;font-size:14px;font-weight:600;}
.pad{padding:18px;}
.row{display:flex;align-items:center;}.col{display:flex;flex-direction:column;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.gap-2{gap:8px;}.gap-3{gap:12px;}.gap-4{gap:16px;}.between{justify-content:space-between;}.center{align-items:center;}.wrap{flex-wrap:wrap;}.grow{flex:1;min-width:0;}.right{text-align:right;}
.mt-2{margin-top:8px;}.mt-3{margin-top:12px;}.mt-4{margin-top:16px;}.mb-2{margin-bottom:8px;}.mb-3{margin-bottom:12px;}
.t10{font-size:10px;}.t11{font-size:11px;}.t12{font-size:12px;}.t13{font-size:13px;}.t14{font-size:14px;}.t15{font-size:15px;}.t16{font-size:16px;}.t18{font-size:18px;}.t22{font-size:22px;}.t26{font-size:26px;}
.w-500{font-weight:500;}.w-600{font-weight:600;}.w-700{font-weight:700;}.upper{text-transform:uppercase;letter-spacing:0.06em;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;font-family:var(--font-mono);}
.b-pos{background:var(--emerald-soft);color:var(--positive);}.b-neg{background:var(--red-soft);color:var(--negative);}.b-info{background:var(--blue-soft);color:var(--dr-blue);}.b-warn{background:var(--amber-soft);color:var(--warn);}.b-neutral{background:var(--surface-2);color:var(--text-2);}.b-ai{background:var(--cyan-soft);color:var(--dr-cyan);}
.sb-buy{background:rgba(16,185,129,0.18);color:var(--positive);}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);font-size:12px;color:var(--text-2);font-weight:500;}
.chip.on{background:var(--text);color:var(--bg);border-color:var(--text);}
.tk-logo{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0;}
.ring{position:relative;display:inline-grid;place-items:center;}.ring svg{transform:rotate(-90deg);}.ring-n{position:absolute;font-family:var(--font-mono);font-weight:600;letter-spacing:-0.02em;}
.bar{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;}.bar>div{height:100%;border-radius:3px;}
.btn{font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;display:inline-flex;align-items:center;gap:6px;border:1px solid transparent;}
.btn-primary{background:var(--dr-blue);color:#fff;}.btn-ghost{background:var(--surface-2);border:1px solid var(--border);}
.btn-sm{padding:6px 11px;font-size:12px;}
.divider{height:1px;background:var(--border);}
.ai-glow{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.ai-glow::before{content:'';position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(135deg,var(--dr-cyan),var(--dr-blue),var(--dr-emerald));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0.5;pointer-events:none;}
.dot-load span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text-muted);margin:0 2px;animation:db 1.2s infinite;}
.dot-load span:nth-child(2){animation-delay:.2s;}.dot-load span:nth-child(3){animation-delay:.4s;}
@keyframes db{0%,60%,100%{opacity:.3;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}
.src{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;color:var(--text-2);font-weight:500;}
.src .v{color:var(--positive);}
.conf-seg{display:flex;height:8px;border-radius:4px;overflow:hidden;}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="bm"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" opacity="0.4"/><circle cx="12" cy="12" r="5" opacity="0.7"/><path d="M12 12 L19 8"/><circle cx="17.5" cy="9" r="1.3" fill="#10B981" stroke="none"/></svg></div><div><div class="bn">DhanRadar</div><div class="bs">AI Layer · UX</div></div></div>
    <nav id="nav"></nav>
    <div class="foot">Every AI surface follows the same contract: <b style="color:var(--text-2);">answer → reasoning → confidence → sources</b>. Never a number without a why.
      <label class="tgl" id="themeT"><span>Dark mode</span><span class="tk"></span></label>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>
<script>
const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
function setTheme(t){document.documentElement.classList.toggle('theme-light',t==='light');document.documentElement.classList.toggle('theme-dark',t==='dark');try{localStorage.setItem('dr-ai-theme',t);}catch(e){}}
setTheme((()=>{try{return localStorage.getItem('dr-ai-theme')||'light';}catch(e){return 'light';}})());
$('#themeT').onclick=()=>setTheme(document.documentElement.classList.contains('theme-dark')?'light':'dark');
function ring(score,size,stroke,col){const r=(size-stroke)/2;const c=2*Math.PI*r;const off=c*(1-score/100);col=col||(score>=85?'var(--positive)':score>=70?'var(--dr-blue)':score>=55?'var(--warn)':'var(--negative)');return `<div class="ring" style="width:${size}px;height:${size}px;"><svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--ring-bg)" stroke-width="${stroke}"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg><div class="ring-n" style="font-size:${Math.round(size*0.32)}px;">${score}</div></div>`;}
window.AI={$,$$,ring};
</script>
<script>
/* DhanRadar — AI Layer UX patterns. Approved DS. */
(function(){
const {ring}=window.AI;
function head(eyebrow,title,lede,usage){return `<div class="eyebrow"><span class="badge b-ai">✦ AI</span> ${eyebrow}</div><h1 class="ttl">${title}</h1><p class="lede">${lede}</p><div class="usage">💡 <div><b>When to use.</b> ${usage}</div></div>`;}
function confBar(v){const col=v>=75?'var(--positive)':v>=50?'var(--warn)':'var(--negative)';const lbl=v>=75?'High confidence':v>=50?'Moderate confidence':'Low confidence';return `<div><div class="row between mb-2"><span class="t11 upper w-600 muted">Confidence</span><span class="mono t12 w-600" style="color:${col};">${v}% · ${lbl}</span></div><div class="conf-seg">${[0,1,2,3,4].map(i=>`<div style="flex:1;margin-right:${i<4?'2px':'0'};background:${(i+1)*20<=v+10?col:'var(--surface-2)'};"></div>`).join('')}</div></div>`;}
function src(name,fresh){return `<span class="src"><span class="v">●</span> ${name}${fresh?` · <span class="muted">${fresh}</span>`:''}</span>`;}

/* 1 AI SEARCH */
const aisearch={id:'aisearch',name:'AI Search',icon:'🔍',group:'AI Surfaces',render:()=>head(
  'Discovery','AI Search','A natural-language entry point that returns a direct, grounded answer above ranked instruments — not just a filtered list. Accepts questions, comparisons, and pasted holdings.',
  'Top-of-funnel discovery and re-finding. Invoked by ⌘K from anywhere. The AI answer is always cited and never blocks the raw results beneath it.'
)+`
  <div class="ai-glow pad" style="max-width:680px;"><div class="row gap-3 center"><span class="muted">🔍</span><input style="flex:1;border:0;background:none;font:inherit;font-size:16px;color:var(--text);outline:none;" value="best large-cap funds under 1% expense with low risk"/><span class="mono t10 muted" style="background:var(--surface-2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;">⌘K</span></div></div>
  <div class="card pad mt-3" style="max-width:680px;border-left:3px solid var(--dr-cyan);">
    <div class="row between mb-2"><span class="badge b-ai">✦ AI answer</span><span class="t11 muted">grounded · 4 sources</span></div>
    <div class="t14 sec" style="line-height:1.6;">Three large-cap funds score ≥80 with expense under 1% and Moderate-or-lower risk: <b style="color:var(--text);">Mirae Asset Large Cap</b> (0.54%, score 84, lowest downside capture), <b style="color:var(--text);">ICICI Pru Bluechip</b> (0.85%, score 81), and <b style="color:var(--text);">Axis Bluechip</b> (0.49%, score 76). Mirae leads on 3-yr risk-adjusted return.</div>
    ${confBar(82)}
    <div class="row gap-2 mt-3 wrap">${src('Fund factsheets','today')}${src('NAV history','1d')}${src('Score model v2.4')}</div>
  </div>
  <div class="t12 muted upper w-600 mt-4 mb-2" style="max-width:680px;">Matching instruments · raw results</div>
  <div style="max-width:680px;">${[['Mirae Asset Large Cap','#0277BD','M',84],['ICICI Pru Bluechip','#B62034','I',81],['Axis Bluechip','#1F4E9E','A',76]].map(f=>`<div class="card pad row between center mb-2"><div class="row gap-3"><div class="tk-logo" style="background:${f[1]};">${f[2]}</div><div class="t13 w-600">${f[0]}</div></div>${ring(f[3],38,4)}</div>`).join('')}</div>
`};

/* 2 AI ASSISTANT */
const assistant={id:'assistant',name:'AI Assistant',icon:'✦',render:()=>head(
  'Conversation','AI Assistant','A chat surface grounded in DhanRadar data. Answers carry inline actions, a confidence read, cited sources, and thumbs feedback that trains the model. Suggested follow-ups keep the user moving.',
  'Deep, multi-turn research and explanation. Reachable from nav, ⌘K, or any "explain" affordance. Refuses to give advice — it explains and surfaces, never instructs.'
)+`
  <div class="card" style="max-width:720px;"><div class="pad" style="display:flex;flex-direction:column;gap:14px;">
    <div class="row" style="justify-content:flex-end;"><div style="background:var(--blue-soft);border-radius:16px 16px 4px 16px;padding:10px 14px;max-width:70%;font-size:13.5px;">Is Reliance a better buy than ONGC right now?</div></div>
    <div class="row"><div class="ai-glow" style="max-width:88%;"><div class="pad"><div class="t14 sec" style="line-height:1.6;"><b style="color:var(--text);">Reliance (86)</b> scores meaningfully higher than <b style="color:var(--text);">ONGC (71)</b>. Reliance leads on Quality (91 vs 64) and Momentum (88 vs 52); ONGC is cheaper on Valuation (PE 8.2 vs 24.2). For a quality-and-momentum tilt, Reliance ranks better — but ONGC suits a deep-value, dividend-led approach.</div>
      <div class="mt-3">${confBar(78)}</div>
      <div class="row gap-2 mt-3 wrap"><span class="chip">⇄ Compare in full</span><span class="chip">↗ Open RELIANCE</span><span class="chip">👍</span><span class="chip">👎</span></div>
      <div class="row gap-2 mt-3 wrap">${src('Q2 FY26 filings','today')}${src('Price data','14:32')}${src('Score model v2.4')}</div>
      <div class="t10 muted mt-2" style="font-style:italic;">Not investment advice. Markets carry risk.</div>
    </div></div></div>
  </div>
  <div class="divider"></div>
  <div class="row gap-2 wrap"><span class="badge b-neutral">Suggested:</span><span class="chip">Why is ONGC cheaper?</span><span class="chip">Show 5-yr returns</span></div>
  </div>
  <div class="pad" style="border-top:1px solid var(--border);"><div class="row gap-2 center"><div class="grow" style="background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--text-muted);">Ask about any stock, fund, or your portfolio…</div><button class="btn btn-primary">Ask ▸</button></div></div></div>
`};

/* 3 RECOMMENDATION EXPLAINABILITY */
const explain={id:'explain',name:'Recommendation Explainability',icon:'◉',group:'Explainability',render:()=>head(
  'Transparency','Recommendation Explainability','Decomposes a signal into the exact factors that drove it, each with its contribution, direction, and a one-line rationale. The bridge between a Score and a decision.',
  'Wherever a Buy/Hold/Avoid signal appears. Tapping a signal expands this. Every factor is itself tappable for a deeper AI explanation.'
)+`
  <div class="card" style="max-width:720px;"><div class="card-h"><div class="tk-logo" style="background:#0A1F4A;">R</div><div><h3>Reliance Industries · why Strong Buy</h3></div><span class="badge sb-buy" style="margin-left:auto;">● Strong Buy · 86</span></div>
  <div class="pad">
    <div class="t13 sec mb-3" style="line-height:1.55;">The 86 is driven mostly by <b style="color:var(--text);">Quality</b> and <b style="color:var(--text);">Momentum</b>. Risk is the only drag. Here’s the full decomposition:</div>
    ${[['Quality',91,'+24','var(--positive)','ROE 9.4%, expanding margins, ₹62K Cr free cash flow'],['Momentum',88,'+21','var(--positive)','50-DMA crossed above 200-DMA; earnings revisions up'],['Growth',82,'+16','var(--positive)','Revenue CAGR 14.2%, Jio ARPU expansion'],['Valuation',78,'+12','var(--positive)','Slightly above sector median but justified by quality'],['Risk',71,'-7','var(--warn)','Rising capex intensity; petrochem cyclicality']].map(f=>`
      <div style="padding:11px 0;border-bottom:1px solid var(--border);">
        <div class="row between center mb-2"><div class="row gap-2 center"><span class="t13 w-600">${f[0]}</span><span class="mono t12 w-600" style="color:${f[3]};">contrib ${f[2]}</span></div><span class="mono t13 w-600">${f[1]}</span></div>
        <div class="bar mb-2"><div style="width:${f[1]}%;background:${f[3]};"></div></div>
        <div class="t12 muted" style="line-height:1.4;">${f[4]} <span style="color:var(--dr-blue);cursor:pointer;">· explain ✦</span></div>
      </div>`).join('')}
    <div class="row gap-2 mt-3 wrap">${src('Q2 FY26 filing')}${src('5-yr financials')}${src('Score model v2.4')}</div>
  </div></div>
`};

/* 4 CONFIDENCE SCORE VISUALIZATION */
const confidence={id:'confidence',name:'Confidence Score Visualization',icon:'◍',render:()=>head(
  'Calibration','Confidence Score Visualization','A consistent visual language for how sure the AI is — separate from the Score itself. Honest uncertainty builds trust. Three tiers (High / Moderate / Low) with reasons for any downgrade.',
  'Attached to every AI-generated answer, recommendation, and fair-value estimate. Low confidence is shown prominently, never hidden.'
)+`
  <div class="g3" style="max-width:760px;">
