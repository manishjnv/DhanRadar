name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Deterministic non-negotiable guards + secret scan (no external services).
  # ---------------------------------------------------------------------------
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Non-negotiable guards + secret scan
        run: python scripts/ci_guards.py
      - name: Anti-pattern sweep (Plan §0.3)
        run: python scripts/anti_pattern_sweep.py
      - name: Compose memory budget (§A6 ~3 GB)
        run: python scripts/check_compose_memory.py

  # ---------------------------------------------------------------------------
  # Lint — ruff + mypy (B40). ADVISORY for now (continue-on-error): the codebase
  # has a pre-existing ruff backlog (~361, mostly import-sort autofixes) and has
  # never been mypy-checked. These steps INVOKE both tools so the signal is
  # visible on every PR; promote this job to blocking (drop continue-on-error)
  # after the one-off lint-cleanup pass — tracked in BLOCKERS.md (B40-followup).
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff + mypy
        run: python -m pip install --upgrade ruff mypy
      - name: ruff check (advisory)
        working-directory: backend
        run: python -m ruff check .
      - name: mypy (advisory)
        working-directory: backend
        run: python -m mypy dhanradar --ignore-missing-imports --no-error-summary || true

  # ---------------------------------------------------------------------------
  # Backend tests (pytest, incl. integration) against a TimescaleDB service
  # (B40: was postgres:16; the real image gives extension availability closer to
  # prod). Redis is faked in tests (fakeredis), so no redis service is needed.
  # ---------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: dhanradar
          POSTGRES_PASSWORD: dhanradar
          POSTGRES_DB: dhanradar_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U dhanradar -d dhanradar_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: dhanradar
      POSTGRES_PASSWORD: dhanradar
      POSTGRES_DB: dhanradar_test
      # Deterministic test creds (conftest also sets these pre-import).
      RAZORPAY_KEY_ID: rzp_test_ci
      RAZORPAY_KEY_SECRET: ci_secret
      RAZORPAY_WEBHOOK_SECRET: ci_webhook_secret
    steps:
      - uses: actions/checkout@v4
      # Path filter: heavy steps run only when backend-relevant files changed.
      # checkout + this filter ALWAYS run, so the job still concludes `success`
      # (green) when skipped — the auto-deploy poller requires this check green,
      # and a skipped JOB would read as not-success and stall every deploy.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run:
              - 'backend/**'
              - 'infra/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
      - uses: actions/setup-python@v5
        if: steps.filter.outputs.run == 'true'
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install deps
        if: steps.filter.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: pytest
        if: steps.filter.outputs.run == 'true'
        working-directory: backend
        run: python -m pytest -q
      - name: No backend changes
        if: steps.filter.outputs.run != 'true'
        run: echo "No backend/infra changes — backend tests skipped; job green."

  # ---------------------------------------------------------------------------
  # Migrations (B40) — exercise the REAL Alembic chain on the TimescaleDB image,
  # not the ORM `create_all` the test suite uses. Runs the init SQL (minus
  # pg_cron, which needs shared_preload_libraries a GH service container can't
  # set), then upgrade head -> downgrade base -> upgrade head to prove the chain
  # is linear AND fully reversible. This is the gate that would have caught the
  # duplicate-0008 branch (see docs/rca/README.md).
  # ---------------------------------------------------------------------------
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16
        env:
          POSTGRES_USER: dhanradar
          POSTGRES_PASSWORD: dhanradar
          POSTGRES_DB: dhanradar
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U dhanradar -d dhanradar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: dhanradar
      POSTGRES_PASSWORD: dhanradar
      POSTGRES_DB: dhanradar
      PGPASSWORD: dhanradar
      # config import requires these (no JWT keys needed — resolved lazily).
      RAZORPAY_KEY_ID: rzp_test_ci
      RAZORPAY_KEY_SECRET: ci_secret
      RAZORPAY_WEBHOOK_SECRET: ci_webhook_secret
    steps:
      - uses: actions/checkout@v4
      # Same poller-safe path filter as the backend job (see note there).
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run:
              - 'backend/**'
              - 'infra/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
      - uses: actions/setup-python@v5
        if: steps.filter.outputs.run == 'true'
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install deps
        if: steps.filter.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Init schemas + extensions (01_init.sql, verbatim)
        if: steps.filter.outputs.run == 'true'
        run: |
          # Run the production init file UNMODIFIED so CI exercises exactly what
          # KVM4 runs. 01_init.sql now self-guards pg_partman/pg_cron in per-extension
          # EXCEPTION blocks, so a GH Actions service container (pg_cron not
          # preloadable; pg_partman absent in timescaledb-ha:pg16) skips both with a
          # NOTICE instead of aborting — no sed pre-processing needed. ON_ERROR_STOP
          # stays on so any OTHER error in the init still fails the job.
          psql -h localhost -U dhanradar -d dhanradar -v ON_ERROR_STOP=1 \
            -f infra/postgres/init/01_init.sql
      - name: alembic upgrade head
        if: steps.filter.outputs.run == 'true'
        working-directory: backend
        run: python -m alembic upgrade head
      - name: alembic downgrade base (prove reversibility)
        if: steps.filter.outputs.run == 'true'
        working-directory: backend
        run: python -m alembic downgrade base
      - name: alembic upgrade head (re-apply clean)
        if: steps.filter.outputs.run == 'true'
        working-directory: backend
        run: python -m alembic upgrade head
      - name: No migration-relevant changes
        if: steps.filter.outputs.run != 'true'
        run: echo "No backend/infra changes — migration chain skipped; job green."

  # ---------------------------------------------------------------------------
  # Frontend — runs fully only once the foundation (frontend/src) is present
  # (it lands via the frontend-foundation PR). On the bare skeleton it skips
  # gracefully so this workflow is green on whichever branch merges first.
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Same poller-safe path filter as the backend job (see note there).
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
      - uses: actions/setup-node@v4
        if: steps.filter.outputs.run == 'true'
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Build + checks (guarded on frontend/src)
        if: steps.filter.outputs.run == 'true'
        working-directory: frontend
        run: |
          if [ ! -d src ]; then
            echo "frontend/src not present yet — skipping frontend job."
            exit 0
          fi
          npm install
          # Enforce the design-system single source: fail if the committed token
          # files (tokens.css / tailwind.tokens.cjs) have drifted from tokens.json.
          # Use check (not gen) so stale committed tokens are caught, not masked.
          npm run check:tokens --if-present
          # Enforce the concept-registry single source (§5): fail if the committed
          # generated registry / lock has drifted from concepts.json + components.json,
          # or if a change breaks the additive-only contract (I4) or I8.
          npm run check:concepts --if-present
          npm run gen:api --if-present
          npm run typecheck --if-present
          npm run lint --if-present
          # B39: vitest now runs real tests (no --passWithNoTests); an empty or
          # broken suite fails here instead of passing vacuously.
          npm run test --if-present
          # B45: prove the app builds with the MSW mock layer OFF — the prod
          # build must never depend on mocks (it has only ever run on MSW).
          NEXT_PUBLIC_API_MOCKING=disabled npm run build
      - name: No frontend changes
        if: steps.filter.outputs.run != 'true'
        run: echo "No frontend changes — frontend build skipped; job green."
