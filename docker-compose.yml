# DhanRadar — Docker Compose stack
# NO host port bindings on any service. cloudflared reaches web/api over the docker network.
# All services read secrets from the single .env file at project root.

# ---------------------------------------------------------------------------
# Logging — volume-capped json-file rotation per service (LOGGING_PLAN.md §4).
# 50 MB × 5 files = ~250 MB ceiling per container; the verbose-but-redacted
# debug stream stays bounded on the 3 GB box with zero extra infra. Applied to
# every service via the `*default-logging` anchor below.
# ---------------------------------------------------------------------------
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

networks:
  dhanradar:
    driver: bridge
  # B38 metrics-scrape bridge. Pre-created on the host (docker network create
  # dhanradar_metrics); the shared etip_prometheus container is attached to it
  # with `docker network connect dhanradar_metrics etip_prometheus`. Declared
  # external so `compose down` can never remove it while the co-tenant scraper
  # is attached. ONLY dhanradar-fastapi joins: the scraper needs /metrics on
  # :8000 and must never be able to reach the password-less dhanradar-redis or
  # dhanradar-postgres on the app network.
  metrics:
    name: dhanradar_metrics
    external: true

volumes:
  dhanradar_pgdata:
  # Redis AOF/RDB persistence. MUST be a named volume: without it the data sits
  # in an anonymous volume that `down`/`-v` orphans or deletes (SEV1 2026-06-11).
  dhanradar_redis_data:
  # Shared scratch for CAS uploads: the API (dhanradar-fastapi) writes the PDF
  # and the dhanradar-celery-batch worker reads + purges it. Without a shared
  # volume the worker's container can't see the API's /tmp file (job → failed).
  dhanradar_cas_tmp:
  # Manual disclosure inbox (mf/manual_ingest.py): the API (dhanradar-fastapi,
  # admin upload channel) writes here; dhanradar-celery-batch reads it (parse
  # task) and also owns the watched-folder scan + email-poller channels. Same
  # writer/reader split as dhanradar_cas_tmp above — unlike CAS, these files are
  # NOT purged after parse (kept for audit / re-parse), so this is a real
  # persistent volume, not scratch.
  dhanradar_manual_ingest:

services:

  # ---------------------------------------------------------------------------
  # Postgres (TimescaleDB HA pg16)
  # NOTE: timescaledb-ha already preloads timescaledb, but pg_cron must be added
  # explicitly via shared_preload_libraries. Verify extension availability on KVM4
  # before first deploy (run: SELECT * FROM pg_available_extensions WHERE name IN
  # ('pg_cron','pg_partman');).
  # ---------------------------------------------------------------------------
  dhanradar-postgres:
    image: timescale/timescaledb-ha:pg16
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      POSTGRES_USER: dhanradar
      POSTGRES_DB: dhanradar
      # POSTGRES_PASSWORD comes from .env
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=timescaledb,pg_cron"
      - "-c"
      - "cron.database_name=dhanradar"
    volumes:
      # timescale/timescaledb-ha keeps PGDATA at /home/postgres/pgdata/data —
      # NOT the vanilla /var/lib/postgresql/data. Mounting the volume at the
      # wrong path left ALL data in the container's writable layer, destroyed
      # on the first recreate (SEV1 data loss, 2026-06-11 — see RCA). The
      # volume MUST be mounted at /home/postgres/pgdata (parent of PGDATA,
      # also covers the image's socket + backup dirs).
      - dhanradar_pgdata:/home/postgres/pgdata
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - dhanradar
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dhanradar -d dhanradar"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis 7 — noeviction + AOF persistence
  # ---------------------------------------------------------------------------
  dhanradar-redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    command: >
      redis-server
      --maxmemory-policy noeviction
      --appendonly yes
    volumes:
      - dhanradar_redis_data:/data
    networks:
      - dhanradar
    deploy:
      resources:
        limits:
          # 256→128M (2026-06-11 rebalance funding the celery-batch bump, B63):
          # live usage ~4MiB; caches/rate-limit keys only at pre-launch scale.
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # FastAPI backend
  # ---------------------------------------------------------------------------
  dhanradar-fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    volumes:
      # Writer side of the CAS hand-off (read + purged by dhanradar-celery-batch).
      - dhanradar_cas_tmp:/tmp/dhanradar_cas
      # Writer side of the manual disclosure inbox (admin upload channel; read by
      # dhanradar-celery-batch's parse task). MANUAL_INGEST_DIR must point here.
      - dhanradar_manual_ingest:/data/manual_ingest
      # BSE Star MF 2.0 webhook keys (read-only). Host-only dir; the private key
      # is root:1001 0640 so the app's appuser (uid/gid 1001) can read it.
      # Referenced by BSE_PRIVATE_KEY_FILE / BSE_WEBHOOK_PUBLIC_KEY_FILE in .env.
      - /etc/dhanradar-keys:/etc/dhanradar-keys:ro
    networks:
      - dhanradar
      - metrics
    depends_on:
      dhanradar-postgres:
        condition: service_healthy
      dhanradar-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # 512→448M (2026-06-11 rebalance, B63): live usage ~124MiB.
          memory: 448M
          cpus: "1.0"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Next.js frontend
  # ---------------------------------------------------------------------------
  dhanradar-nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      # Next.js standalone server.js binds to $HOSTNAME, which Docker sets to the
      # container id → it listens ONLY on the container's network IP, so the
      # localhost healthcheck (and any loopback probe) fails. Bind all interfaces
      # so the wget healthcheck passes and cloudflared's service_healthy dep is met.
      HOSTNAME: "0.0.0.0"
    networks:
      - dhanradar
    deploy:
      resources:
        limits:
          # 448→320M (2026-06-11 rebalance, B63): live usage ~45MiB (standalone).
          memory: 320M
          cpus: "0.50"
    healthcheck:
      # Use 127.0.0.1, NOT localhost: alpine resolves `localhost` to ::1 (IPv6)
      # first, but the standalone server binds IPv4 0.0.0.0 only, so a localhost
      # probe gets ECONNREFUSED. 127.0.0.1 forces IPv4 (covered by 0.0.0.0).
      test:
        - "CMD-SHELL"
        - >
          wget -qO- http://127.0.0.1:3000/ > /dev/null 2>&1 && echo ok || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Celery workers — all built from the same backend image
  # ---------------------------------------------------------------------------
  dhanradar-celery-batch:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    # autoheal (below) restarts this container if the healthcheck fails
    # AUTOHEAL_START_PERIOD+retries*interval times — the container-level
    # backstop alongside the task_time_limit framework-level fix
    # (celery_app.py) that's the PRIMARY recovery path (2026-07-08 hardening).
    labels:
      - "autoheal=true"
    # --concurrency=1: prefork default (= vCPU count = 4) × per-child RSS blew past
    # the cgroup memory limit → OOM-kill loop (RCA 2026-06-09). CAS parse is heavy
    # (casparser+scipy) and infrequent; one worker per queue fits the limit safely.
    command: ["celery", "-A", "dhanradar.celery_app", "worker", "-Q", "batch", "--concurrency=1", "--loglevel=info"]
    volumes:
      # Reader/purger side of the CAS hand-off (written by dhanradar-fastapi).
      - dhanradar_cas_tmp:/tmp/dhanradar_cas
      # Reader side of the manual disclosure inbox (parse task + folder-scan +
      # email-poller channels all run on this worker; admin upload writes it).
      - dhanradar_manual_ingest:/data/manual_ingest
    networks:
      - dhanradar
    depends_on:
      dhanradar-postgres:
        condition: service_healthy
      dhanradar-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # 256M OOM-killed (SIGKILL) the scoring step on 2026-06-11 once the NAV
          # backfill became COMPLETE (5.94M rows vs the prior partial 2.03M — the
          # pre-B61 backfill silently lost windows): the cohort benchmark loads
          # peer NAV series in-process. 640M funded by cuts elsewhere (redis,
          # nextjs, fastapi, cloudflared — all ≥2.5× live usage after the cut)
          # so the §A6 3072M budget HOLDS. If 640M still OOMs, the answer is
          # B63 (push cohort aggregation into SQL), NOT more RAM.
          memory: 640M
          cpus: "0.50"
    # Confirms the WORKER PROCESS in THIS specific container is responsive
    # (celery's control/inspect mailbox is served by the main process, separate
    # from the single prefork child executing a task — so this still answers
    # while a long-but-healthy scrape is mid-run). Targets THIS container's own
    # node (`celery@<container-id>`, read from /etc/hostname rather than the
    # `hostname` binary, which python:3.12-slim does not install) so a sibling
    # worker replying can never mask THIS container being dead (2026-07-08).
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          celery -A dhanradar.celery_app inspect ping -d "celery@$(cat /etc/hostname)" --timeout 10 | grep -q OK
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s

  dhanradar-celery-mood:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    labels:
      - "autoheal=true"
    command: ["celery", "-A", "dhanradar.celery_app", "worker", "-Q", "mood", "--concurrency=1", "--loglevel=info"]
    networks:
      - dhanradar
    depends_on:
      dhanradar-postgres:
        condition: service_healthy
      dhanradar-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # ~118 MiB resident at idle. History: a 192M→128M trim OOM-killed every
          # scheduled run (no snapshot 2026-06-16→06-19, RCA 2026-06-19) → restored to
          # 192M. Activating Upstox (2026-06-22) added the ~1800-row /option/contract
          # parse AND tripped the AI-commentary path (now ≥7 signals), so a full
          # 10/11-signal snapshot peaked past 192M and OOM-killed again (RCA 2026-06-22).
          # Bumped to 384M. Total dhanradar budget 3136→3328M, well within ~6 GiB headroom.
          memory: 384M
          cpus: "0.25"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          celery -A dhanradar.celery_app inspect ping -d "celery@$(cat /etc/hostname)" --timeout 10 | grep -q OK
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s

  dhanradar-celery-misc:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    labels:
      - "autoheal=true"
    command: ["celery", "-A", "dhanradar.celery_app", "worker", "-Q", "misc", "--concurrency=1", "--loglevel=info"]
    networks:
      - dhanradar
    depends_on:
      dhanradar-postgres:
        condition: service_healthy
      dhanradar-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # misc renders Pillow share-cards (1200x630) on send_notification — spiky.
          # 128M sat at ~95% idle and would OOM under that load; keep 192M. beat's
          # +64M is funded entirely by mood's slack (192→128), so total stays 3072M.
          memory: 192M
          cpus: "0.25"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          celery -A dhanradar.celery_app inspect ping -d "celery@$(cat /etc/hostname)" --timeout 10 | grep -q OK
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s

  dhanradar-celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    # --schedule in /tmp: the image runs as non-root (appuser) and /app is
    # root-owned, so the default ./celerybeat-schedule write fails with EACCES
    # and beat crash-loops. /tmp is writable; the schedule file only caches
    # last-run times (safe to lose on restart).
    command: ["celery", "-A", "dhanradar.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    networks:
      - dhanradar
    depends_on:
      dhanradar-postgres:
        condition: service_healthy
      dhanradar-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # beat imports the full app (sqlalchemy + all task modules) → ~88 MiB;
          # 64M was too tight and OOM-crash-looped (RCA 2026-06-09). 128M funded by
          # trimming mood+misc (now concurrency=1). Net compose memory unchanged-ish.
          memory: 128M
          cpus: "0.10"

  # ---------------------------------------------------------------------------
  # Autoheal (2026-07-08, celery-resilience hardening) — plain `docker compose`
  # (not Swarm) never auto-restarts a container just because its healthcheck
  # reports "unhealthy"; this tiny, widely-used companion watches Docker's own
  # health status and restarts any container labeled `autoheal=true` when it
  # goes unhealthy. Scoped ONLY to the 3 celery workers via the label (NOT
  # "all containers" — must never touch postgres/redis/fastapi/nextjs/
  # cloudflared, let alone any co-tenant etip_* container on the shared box).
  # This is the container-level backstop; the PRIMARY recovery mechanism is
  # the task_time_limit hard-kill in celery_app.py, which self-heals the
  # worker process WITHOUT needing a container restart at all — autoheal only
  # matters if the worker's own main process (not just a task) wedges.
  # Read-only docker.sock mount — autoheal only calls restart on labeled
  # containers, never inspects/touches anything else on the shared host.
  # ---------------------------------------------------------------------------
  dhanradar-autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    logging: *default-logging
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.10"

  # ---------------------------------------------------------------------------
  # Cloudflared tunnel
  # Image pinned to 2026.5.0 — do NOT upgrade without checking KVM4 shared infra.
  #
  # Bind-mounts (read-only):
  #   config.yml  : committed to repo at ./infra/cloudflared/config.yml
  #   dhanradar.json : lives ONLY on KVM4 at /etc/cloudflared-dhanradar/dhanradar.json
  #                    (credentials file is NEVER committed — see infra-notes.md)
  # ---------------------------------------------------------------------------
  dhanradar-cloudflared:
    image: cloudflare/cloudflared:2026.5.0
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    command: ["tunnel", "--config", "/etc/cloudflared/config.yml", "--no-autoupdate", "run"]
    volumes:
      - ./infra/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      # KVM4 host path — credentials file; never committed to repo
      - /etc/cloudflared-dhanradar/dhanradar.json:/etc/cloudflared/dhanradar.json:ro
    networks:
      - dhanradar
    depends_on:
      dhanradar-fastapi:
        condition: service_healthy
      dhanradar-nextjs:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # 128→64M (2026-06-11 rebalance, B63): live usage ~16MiB (tunnel proxy).
          memory: 64M
          cpus: "0.10"
